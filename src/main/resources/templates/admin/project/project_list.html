<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Quản lý Dự án</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
</head>
<body class="sb-nav-fixed">

<!-- Navbar -->
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <!-- Sidebar -->
    <div th:replace="admin/common/sidebar :: sidebar"></div>
    <!-- Main Content -->
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <!-- Tiêu đề & Thanh công cụ -->
                    <div class="table-title d-flex justify-content-between align-items-center flex-wrap">
                        <h2>Quản lý <b>Dự án</b></h2>
                        <div class="d-flex align-items-center">
                            <!-- Tìm kiếm -->
                            <form th:action="@{/admin/project/list}" method="get" class="d-flex me-2" style="width: 300px;">
                                <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm dự án..."
                                       th:value="${keyword}">
                                <button class="btn btn-primary" type="submit">
                                    <i class="fas fa-search"></i>
                                </button>
                            </form>
                            <!-- Nút thêm -->
                            <a th:href="@{/admin/project/add}" class="btn btn-success me-2">
                                <i class="material-icons">&#xE147;</i> <span>Thêm mới</span>
                            </a>
                            <!-- Nút xóa nhiều -->
                            <button type="submit" form="deleteSelectedForm" class="btn btn-danger">
                                <i class="material-icons">delete</i> <span>Xoá</span>
                            </button>
                        </div>
                    </div>

                    <!-- Form xóa nhiều -->
                    <form th:action="@{/admin/project/delSelected}" method="post" id="deleteSelectedForm">
                        <table class="table table-striped table-hover">
                            <thead>
                            <tr>
                                <th><input type="checkbox" id="checkAll"></th>
                                <th>STT</th>
                                <th>Tên dự án</th>
                                <th>Ngày tạo</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="project,stat : ${projectPage.content}">
                                <td><input type="checkbox" name="ids" th:value="${project.projectId}"></td>
                                <td th:text="${stat.index + 1}"></td>
                                <td th:text="${project.projectName}"></td>
                                <td th:text="${#temporals.format(project.updateAt != null ? project.updateAt : project.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{'/admin/project/edit/' + ${project.projectId}}" class="edit">
                                        <i class="material-icons" data-toggle="tooltip" title="Sửa">&#xE254;</i>
                                    </a>
                                    <a href="javascript:void(0)" class="delete"
                                       th:onclick="'deleteProject(' + ${project.projectId} + ')'">
                                        <i class="material-icons" data-toggle="tooltip" title="Xóa">&#xE872;</i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </form>

                    <!-- Phân trang -->
                    <nav>
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${projectPage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/project/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, projectPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/project/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${projectPage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/project/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Script -->
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    // ----- Xóa 1 dự án (dùng confirm alert) -----
    function deleteProject(projectId) {
        if (confirm("Bạn có chắc chắn muốn xóa dự án này? Hành động này không thể hoàn tác.")) {
            fetch(`/admin/project/delete/${projectId}`, {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken }
            })
                .then(response => {
                    if (response.ok) {
                        selectedIds.delete(projectId);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
                        window.location.reload();
                    } else {
                        alert("Xóa thất bại!");
                    }
                })
                .catch(() => alert("Có lỗi xảy ra!"));
        }
    }

    // ----- Xóa nhiều -----
    const STORAGE_KEY = 'selectedProjectIds';
    let selectedIds = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);

    document.addEventListener('DOMContentLoaded', () => {
        const checkboxes = document.querySelectorAll('input[name="ids"]');
        const checkAll = document.getElementById('checkAll');

        // Load trạng thái checkbox từ localStorage
        checkboxes.forEach(cb => {
            const id = parseInt(cb.value);
            if (selectedIds.has(id)) cb.checked = true;

            cb.addEventListener('change', () => {
                cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
            });
        });

        // Chọn tất cả
        checkAll.addEventListener('click', e => {
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                const id = parseInt(cb.value);
                e.target.checked ? selectedIds.add(id) : selectedIds.delete(id);
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
        });
    });

    // Xác nhận xóa nhiều
    document.getElementById('deleteSelectedForm').addEventListener('submit', function (e) {
        if (selectedIds.size === 0) {
            alert("Vui lòng chọn ít nhất 1 dự án để xóa.");
            e.preventDefault();
            return;
        }
        if (!confirm("Bạn có chắc chắn muốn xóa các dự án đã chọn?\nHành động này không thể phục hồi.")) {
            e.preventDefault();
            return;
        }

        selectedIds.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            this.appendChild(input);
        });
        localStorage.removeItem(STORAGE_KEY);
    });
</script>
<script src="/admin/js/scripts.js"></script>
</body>
</html>

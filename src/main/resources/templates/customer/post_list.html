<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="">
    <meta name="author" content="Tooplate">

    <title>Moso Interior - Product Detail Page</title>

    <!-- CSS FILES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100;300;400;600;700&display=swap"
          rel="stylesheet">
    <link href="/customer/css/bootstrap.min.css" rel="stylesheet">
    <link href="/customer/css/bootstrap-icons.css" rel="stylesheet">
    <link href="/customer/css/owl.carousel.min.css" rel="stylesheet">
    <link href="/customer/css/tooplate-moso-interior.css" rel="stylesheet">
    <link href="/customer/css/home.css" rel="stylesheet">
    <link href="/customer/css/commom.css" rel="stylesheet">
</head>

<body class="shop-detail-page">

<di th:replace="customer/common/header::header"></di>
<main class="col-12 order-2 order-md-1 mb-4">
    <section class="container my-5">
        <p><a href="#">Trang chủ</a> » Tin tức</p>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            <div th:each="post : ${Post}" class="col">
                <div class="news-card h-100 border rounded shadow-sm overflow-hidden">
                    <img src="https://vesinh4.mauthemewp.com/wp-content/uploads/2019/05/post8.jpg"
                         alt="Tin tức"
                         class="img-fluid w-100"
                         style="height:180px;object-fit:cover;">

                    <div class="p-3">
                        <h6 th:text="${post.title}" class="fw-bold mb-2"></h6>
                        <p th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}" class="text-muted small mb-2"></p>
<!--                        <p class="mb-2">Những mẹo nhỏ giúp bạn giữ không gian sống luôn sạch sẽ, thoáng mát...</p>-->
                        <a th:href="@{/Post/{id}(id=${post.postId})}" class="btn btn-outline-success btn-sm rounded-pill">Xem chi tiết</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
    <path fill="#36363e" fill-opacity="1"
          d="M0,96L40,117.3C80,139,160,181,240,186.7C320,192,400,160,480,149.3C560,139,640,149,720,176C800,203,880,245,960,250.7C1040,256,1120,224,1200,229.3C1280,235,1360,277,1400,298.7L1440,320L1440,320L1400,320C1360,320,1280,320,1200,320C1120,320,1040,320,960,320C880,320,800,320,720,320C640,320,560,320,480,320C400,320,320,320,240,320C160,320,80,320,40,320L0,320Z"></path>
</svg>
<div th:replace="customer/common/footer::footer"></div>

<!-- JAVASCRIPT FILES -->
<script src="/customer/js/jquery.min.js"></script>
<script src="/customer/js/bootstrap.min.js"></script>
<script src="/customer/js/click-scroll.js"></script>
<script src="/customer/js/jquery.backstretch.min.js"></script>
<script src="/customer/js/owl.carousel.min.js"></script>
<script src="/customer/js/custom.js"></script>
<script src="/customer/js/home.js"></script>

</body>
</html>

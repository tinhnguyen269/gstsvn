<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Dịch vụ vệ sinh chuyên nghiệp GSTS">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dyeje8mx3/image/upload/v1755881089/gsts-logo_xeyjz1.png">
    <title>GSTS Dịch vụ vệ sinh chuyên nghiệp</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .lottie-animation {
            width: 300px;
            height: 300px;
        }
        h1 {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545;
        }
        p {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="error-container container">
    <!-- Animation -->
    <div class="lottie-animation" id="lottie401"></div>

    <!-- Nội dung -->
    <div class="error-content">
        <h1>401</h1>
        <p>Ồ! Bạn chưa có token nên không thể đăng nhập.</p>
        <a class="btn btn-primary btn-lg" href="javascript:history.back()">
            Quay lại
        </a>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Lottie script -->
<script>
    lottie.loadAnimation({
        container: document.getElementById('lottie401'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: 'https://assets4.lottiefiles.com/packages/lf20_tnrzlN.json' // đổi sang animation phù hợp cho 403
    });
</script>
</body>
</html>

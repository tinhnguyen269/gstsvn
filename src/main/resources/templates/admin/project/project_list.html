<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Dự án </title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
    <script>
        $(document).ready(function () {
            // Activate tooltip
            $('[data-toggle="tooltip"]').tooltip();

            // Select/Deselect checkboxes
            var checkbox = $('table tbody input[type="checkbox"]');
            $("#selectAll").click(function () {
                if (this.checked) {
                    checkbox.each(function () {
                        this.checked = true;
                    });
                } else {
                    checkbox.each(function () {
                        this.checked = false;
                    });
                }
            });
            checkbox.click(function () {
                if (!this.checked) {
                    $("#selectAll").prop("checked", false);
                }
            });
        });
    </script>
</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>

<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar:: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row">
                            <div class="col-sm-6">
                                <h2>Quản lí <b>dự án</b></h2>
                            </div>
                            <div class="col-sm-12 d-flex justify-content-end">
                                <div class="input-group me-2" style="width: 250px;">
                                    <form th:action="@{/admin/project/list}" method="get" class="d-flex me-2" style="width: 300px;">
                                        <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm dự án..."
                                               th:value="${keyword}" aria-label="Search">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                                <a th:href="@{/admin/project/add}" class="btn btn-success">
                                    <i class="material-icons">&#xE147;</i> <span>Thêm mới</span>
                                </a>
                            </div>


                        </div>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên dự án</th>
                            <th>Ngày tạo</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="project : ${projectPage.content}">
                            <td th:text="${project.projectId}"></td>
                            <td th:text="${project.projectName}"></td>
                            <td th:text="${#temporals.format(project.updateAt != null ? project.updateAt : project.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{'/admin/project/edit/' + ${project.projectId}}" class="edit"><i
                                        class="material-icons" data-toggle="tooltip" title="Edit">&#xE254;</i></a>
                                <a href="#deleteProjectModal" class="delete" data-toggle="modal"
                                   th:onclick="'openDeleteModal(' + ${project.projectId} + ')'"><i
                                        class="material-icons" data-toggle="tooltip" title="Delete">&#xE872;</i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center">
                            <!-- Previous -->
                            <li class="page-item" th:classappend="${projectPage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/project/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, projectPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/project/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}">1</a>
                            </li>

                            <!-- Next -->
                            <li class="page-item" th:classappend="${projectPage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/project/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>
            <!-- Delete Modal HTML -->
            <div id="deleteProjectModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h4 class="modal-title">Xóa bài viết </h4>
                            <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                            </button>
                        </div>
                        <div class="modal-body">
                            <p>Bạn có chắc chắn muốn xóa bài viết không ?</p>
                            <p class="text-warning"><small>Hành động này không thể phục hồi.</small></p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-default" data-dismiss="modal">Hủy</button>
                            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Xóa</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="admin/js/scripts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
<script src="admin/assets/demo/chart-area-demo.js"></script>
<script src="admin/assets/demo/chart-bar-demo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
        crossorigin="anonymous"></script>
<script src="admin/js/datatables-simple-demo.js"></script>

<script>
    // Lấy CSRF token và header name từ meta
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    let projectIdToDelete = null;

    function openDeleteModal(projectId) {
        projectIdToDelete = projectId;
        const deleteModal = new bootstrap.Modal(document.getElementById('deleteProjectModal'));
        deleteModal.show();
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
        if (projectIdToDelete) {
            fetch(`/admin/project/delete/${projectIdToDelete}`, {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken // Gửi CSRF token
                }
            })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert("Xóa thất bại!");
                    }
                })
                .catch(error => {
                    console.error(error);
                    alert("Có lỗi xảy ra!");
                });
        }
    });

</script>

</body>
</html>

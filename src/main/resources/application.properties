
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# C?u h�nh DataSource
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# C?u h�nh Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# C?u h�nh upload file
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.hikari.connectionTimeout=30000

# C?u h�nh Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# C?u h�nh g?i email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# C?u h�nh SendGrid
#sendgrid.api.key=${SENDGRID_API_KEY}
#sendgrid.from.email=${SPRING_MAIL_USERNAME}

# C?u h�nh Redis (Upstash)
spring.data.redis.url=${REDIS_URL}
spring.data.redis.ssl.enabled=true

server.address=0.0.0.0

# App URL g?c (d�ng trong link k�ch ho?t)
app.host=${APP_HOST}

company.email=${SPRING_MAIL_USERNAME}

server.port=${SERVER_PORT}

server.servlet.session.tracking-modes=cookie

# Cấu hình locale tiếng Việt
spring.web.locale=vi_VN
spring.web.locale-resolver=fixed

# Hỗ trợ reverse proxy (nginx, apache) trên VPS
server.forward-headers-strategy=native
server.use-forward-headers=true

# Cấu hình Session Cookie (chỉ cho admin pages)
# Lưu ý: NoSessionFilter sẽ chặn JSESSIONID cho public pages
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
server.servlet.session.timeout=30m


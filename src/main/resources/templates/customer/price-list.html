<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="">
    <meta name="author" content="Tooplate">

    <title>Bảng giá dịch vụ</title>

    <!-- CSS FILES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100;300;400;600;700&display=swap"
          rel="stylesheet">

    <link href="/customer/css/bootstrap.min.css" rel="stylesheet">

    <link href="/customer/css/bootstrap-icons.css" rel="stylesheet">

    <link href="/customer/css/owl.carousel.min.css" rel="stylesheet">

    <link href="/customer/css/tooplate-moso-interior.css" rel="stylesheet">

    <link href="/customer/css/commom.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .nav-link.active {
            color: green;
            border-bottom: 2px solid green;
        }

        .price-table img {
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<di th:replace="/customer/common/header::header"></di>

<div class="container py-4">
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" id="sofa-tab" onclick="changeImage(event, 'sofa')">Giá giặt ghế sofa</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" onclick="changeImage(event, 'nem')">Giá giặt nệm</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" onclick="changeImage(event, 'tham')">Giá giặt thảm</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" onclick="changeImage(event, 'rem')">Giá giặt rèm</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" onclick="changeImage(event, 'vesinh')">Giá vệ sinh kính</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" onclick="changeImage(event, 'xaydung')">Giá VS sau xây dựng</a>
        </li>
    </ul>

    <div class="price-table text-center">
        <img id="priceImage" src="images/price/sofa.png" alt="Bảng giá dịch vụ">
    </div>
    <!--Button contact-->
    <div th:replace="customer/common/contact:: contact"></div>
</div>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
    <path fill="#36363e" fill-opacity="1"
          d="M0,96L40,117.3C80,139,160,181,240,186.7C320,192,400,160,480,149.3C560,139,640,149,720,176C800,203,880,245,960,250.7C1040,256,1120,224,1200,229.3C1280,235,1360,277,1400,298.7L1440,320L1440,320L1400,320C1360,320,1280,320,1200,320C1120,320,1040,320,960,320C880,320,800,320,720,320C640,320,560,320,480,320C400,320,320,320,240,320C160,320,80,320,40,320L0,320Z"></path>
</svg>
<div th:replace="/customer/common/footer::footer"></div>


<!-- JAVASCRIPT FILES -->
<script src="/customer/js/jquery.min.js"></script>
<script src="/customer/js/bootstrap.min.js"></script>
<script src="/customer/js/click-scroll.js"></script>
<script src="/customer/js/jquery.backstretch.min.js"></script>
<script src="/customer/js/owl.carousel.min.js"></script>
<script src="/customer/js/custom.js"></script>
<script>
    function changeImage(event, type) {
        document.getElementById('priceImage').src = 'images/price/' + type + '.jpg';

        // Bỏ active ở tất cả các tab
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => link.classList.remove('active'));

        // Thêm active vào tab được click
        event.target.classList.add('active');
    }
</script>
</body>
</html>

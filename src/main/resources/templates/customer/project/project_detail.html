<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(${project.projectName}, ~{::styles})">
    <styles>
        <link href="/customer/css/post-detail.css" rel="stylesheet">
        <link href="/customer/css/project.css" rel="stylesheet">
    </styles>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="customer/common/navbar::header"></div>

<div class="container mt-4 pt-4">
    <div class="row">
        <div class="col-12 col-md-8 order-1 order-md-1 mb-4">
            <div class="container my-5 service-detail">
                <nav aria-label="breadcrumb" >
                    <ol class="breadcrumb bg-transparent p-0 mb-3">
                        <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-dark">Trang chủ</a></li>
                        <li class="breadcrumb-item active text-dark" aria-current="page">Dự án đã hoàn thành</li>
                    </ol>
                </nav>
                <h4 th:text="${project.projectName}"></h4>
                <br>
                <div class="row g-4">
                    <div class="col-lg-4 col-md-6 col-sm-12" th:each="img : ${images}">
                        <div class="image-wrapper">
                            <img th:src="@{${img.imageProjectUrl}}" alt="Ảnh dự án"
                                 class="img-fluid project-img-hover">
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-5" th:replace="customer/common/post :: post"></div>
        </div>
        <!-- Modal hiển thị ảnh -->
        <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-xl">
                <div class="modal-content bg-transparent border-0">
                    <div class="modal-body text-center p-0">
                        <img id="modalImage" src="" class="img-fluid rounded shadow" alt="Ảnh phóng to" style="cursor:pointer;">
                    </div>
                </div>
            </div>
        </div>


        <aside class="col-12 col-md-4 order-2 order-md-2">
            <div class="mb-4" th:replace="customer/common/sidebar :: sidebarService"></div>
            <div th:replace="customer/common/sidebar :: sidebarPost"></div>
        </aside>
    </div>
    <!--Button contact-->
    <div th:replace="customer/common/contact:: contact"></div>
    <!--Button scroll head-->
    <div th:replace="customer/common/scroll_head:: scroll-head"></div>
</div>

<div th:replace="customer/common/footer::footer"></div>
<!-- JAVASCRIPT FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll(".project-img-hover");
        const modalImage = document.getElementById("modalImage");
        const modal = new bootstrap.Modal(document.getElementById("imageModal"));
        let currentIndex = 0;

        // Khi click ảnh nhỏ => mở modal
        images.forEach((img, index) => {
            img.addEventListener("click", () => {
                currentIndex = index;
                modalImage.src = img.src;
                modal.show();
            });
        });

        // Hàm chuyển ảnh
        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            modalImage.src = images[currentIndex].src;
        }

        // Click vào ảnh phóng to => chuyển ảnh kế tiếp
        modalImage.addEventListener("click", nextImage);

        // Dùng phím mũi tên trái/phải để điều hướng nếu muốn
        document.addEventListener("keydown", (e) => {
            if (document.getElementById("imageModal").classList.contains("show")) {
                if (e.key === "ArrowRight") nextImage();
            }
        });
    });
</script>
<script src="/customer/js/common.js"></script>


</body>
</html>

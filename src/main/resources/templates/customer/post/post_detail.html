<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="">
    <meta name="author" content="Tooplate">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dyeje8mx3/image/upload/v1755924095/gsts-logo_ll5vaz.png">

    <title>Tin tức</title>

    <!-- CSS FILES -->

    <link href="/customer/css/post-detail.css" rel="stylesheet">
    <link href="/customer/css/common.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
<div th:replace="customer/common/header:: header"></div>


<!-- Content + Sidebar -->
<div class="container mt-5 pt-4">
    <div class="row ">
        <!-- Nội dung chính -->
        <div class="col-12 col-md-8 mb-5 mb-md-0">
            <nav aria-label="breadcrumb" class="pt-4 mt-1">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item"><a th:href="@{/home/post/list}" class="text-decoration-none text-dark"> Tin tức</a></li>
                    <li class="breadcrumb-item active text-dark" aria-current="page">Chi tiết</li>
                </ol>
            </nav>

            <h4 th:text="${post.title}" class="fw-bold mb-3"></h4>
            <div class="text-muted mb-3">
                <i class="fa-regular fa-clock me-1"></i>
                <span th:text="${post.updateAt != null ? #temporals.format(post.updateAt, 'dd/MM/yyyy HH:mm') : #temporals.format(post.createAt, 'dd/MM/yyyy HH:mm')}"></span>
            </div>

            <!-- Nội dung bài viết -->
            <div class="article-content" th:utext="${post.content}"></div>

        </div>
        <!-- Sidebar -->
        <aside class="col-12 col-md-4 order-1 order-md-2" th:replace="customer/common/sidebar :: sidebar"></aside>

    </div>

    <!-- Nút liên hệ -->
    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>
</div>

<div th:replace="customer/common/footer :: footer"></div>
<!-- JAVASCRIPT FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

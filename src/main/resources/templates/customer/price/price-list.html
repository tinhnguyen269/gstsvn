<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="author" content="Tooplate" />
    <title>Bảng giá dịch vụ</title>

    <!-- CSS FILES -->
    <link href="/customer/css/post-detail.css" rel="stylesheet" />
    <link href="/customer/css/common.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/customer/css/price-list.css" rel="stylesheet" />
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="customer/common/header::header"></div>

<div class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="pt-4 mt-5">
        <ol class="breadcrumb bg-transparent p-0 mb-3">
            <li class="breadcrumb-item"><a th:href="@{/home}" class="text-decoration-none text-dark">Trang chủ</a></li>
            <li class="breadcrumb-item active text-dark" aria-current="page">Bảng giá</li>
        </ol>
    </nav>
    <ul class="nav nav-tabs justify-content-center">
        <li th:each="service, iterStat : ${serviceAdvice}" class="nav-item">
            <a th:text="${service.serviceName}"
               th:attr="data-img=${service.imgPrice}, id=${iterStat.index == 0 ? 'sofa-tab' : null}"
               class="nav-link"
               onclick="changeImage(event, this)"></a>
        </li>
    </ul>
    <div class="price-table text-center my-4">
        <img id="priceImage" src="" alt="Bảng giá dịch vụ" class="img-fluid rounded shadow" />
    </div>

    <!--Button contact-->
    <div th:replace="customer/common/contact:: contact"></div>
</div>

<div th:replace="customer/common/footer::footer" class="mt-auto"></div>

<!-- JAVASCRIPT FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function changeImage(event, element) {
        const imageUrl = element.getAttribute('data-img');
        const priceImg = document.getElementById('priceImage');

        priceImg.style.opacity = '0';
        setTimeout(() => {
            priceImg.src = imageUrl;
            priceImg.style.opacity = '1';
        }, 300);

        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => link.classList.remove('active'));
        element.classList.add('active');
    }

    window.onload = function() {
        const priceImg = document.getElementById('priceImage');
        const firstTab = document.getElementById('sofa-tab');
        if (firstTab) {
            priceImg.src = firstTab.getAttribute('data-img');
            firstTab.classList.add('active');
        }
    }
</script>
</body>
</html>

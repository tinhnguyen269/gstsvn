<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Dashboard - SB Admin</title>
    <th:block th:replace="admin/common/header :: header"></th:block>

</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar:: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row">
                            <div class="col-sm-6">
                                <h2>Quản lí <b>khách hàng</b></h2>
                            </div>
                            <div class="col-sm-12 d-flex justify-content-end">
                                <div class="input-group me-2" style="width: 250px;">
                                    <form th:action="@{/user/list}" method="get" class="d-flex me-2"
                                          style="width: 300px;">
                                        <input class="form-control me-2" type="text" name="keyword"
                                               placeholder="Tìm nhân viên ..."
                                               th:value="${keyword}" aria-label="Search">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Tài khoản</th>
                            <th>Email</th>
                            <th>Số điện thoại</th>
                            <th>Địa chỉ</th>
                            <th>Quyền tài khoản</th>
                            <th>Ngày tạo</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${userPage.content}">
                            <td th:text="${user.userId}"></td>
                            <td th:text="${user.fullName}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.phoneNumber}"></td>
                            <td th:text="${user.address}"></td>
                            <td th:text="${user.role != null ? user.role.roleName : 'Không có'}"></td>
                            <td th:text="${#temporals.format(user.updateAt != null ? user.updateAt : user.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a href="#editUserModal"
                                   class="edit"
                                   th:data-id="${user.userId}"
                                   data-toggle="modal">
                                    <i class="material-icons" data-toggle="tooltip" title="Edit">&#xE254;</i>
                                </a>

                                <a href="#deleteUserModal" class="delete" data-toggle="modal"
                                   th:data-id="${user.userId}"
                                ><i
                                        class="material-icons" data-toggle="tooltip" title="Delete">&#xE872;</i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center">
                            <!-- Previous -->
                            <li class="page-item" th:classappend="${userPage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/user/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, userPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/user/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}">1</a>
                            </li>

                            <!-- Next -->
                            <li class="page-item" th:classappend="${userPage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/user/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>
            <!-- Edit Modal HTML -->
            <div id="editUserModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="editForm">
                            <div class="modal-header">
                                <h4 class="modal-title">Chỉnh sửa nhân viên</h4>
                                <button type="button" class="close" data-dismiss="modal">&times;</button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="editUserId" id="editUserId">
                                <div class="form-group">
                                    <label>Tên</label>
                                    <input name="editFullName" id="editFullName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Tài khoản</label>
                                    <input name="editUserName" id="editUserName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input name="editEmail" id="editEmail" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input name="editPhoneNumber" id="editPhoneNumber" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Địa chỉ</label>
                                    <input name="editAddress" id="editAddress" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Vị trí (quyền đăng nhập)</label>
                                    <select name="editRoleId" id="editRoleId" class="form-control" required>
                                        <option th:each="role : ${allRoles}"
                                                th:value="${role.roleId}"
                                                th:text="${role.roleName}">
                                        </option>
                                    </select>


                                </div>

                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div id="deleteUserModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="deleteForm">
                            <input type="hidden" id="deleteUserId" name="deleteUserId">
                            <div class="modal-header">
                                <h4 class="modal-title">Xóa nhân viên</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                                </button>
                            </div>
                            <div class="modal-body">
                                <p>Are you sure you want to delete these Records?</p>
                                <p class="text-warning"><small>This action cannot be undone.</small></p>
                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
                                <input type="submit" class="btn btn-danger" value="Delete">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script>
    $(document).ready(function () {
        // Khi bấm vào nút sửa
        $('.edit').on('click', function () {
            var userId = $(this).data('id');
            $.ajax({
                url: '/user/edit/' + userId,
                type: 'GET',
                success: function (data) {
                    // Fill data vào form
                    $('#editUserId').val(data.userId);
                    $('#editFullName').val(data.fullName);
                    $('#editUserName').val(data.username);
                    $('#editEmail').val(data.email);
                    $('#editPhoneNumber').val(data.phoneNumber);
                    $('#editAddress').val(data.address);
                    $('#editRoleId').val(data.roleId);
                },
                error: function () {
                    alert('Không thể lấy dữ liệu khách hàng.');
                }
            });
        });

        $('.delete').on('click', function () {
            var userId = $(this).data('id');
            $('#deleteUserId').val(userId);
        });


        $('#deleteForm').on('submit', function (e) {
            e.preventDefault(); // tránh submit form thật
            var userId = $('#deleteUserId').val();
            $.ajax({
                url: '/user/delete/' + userId,
                type: 'POST',
                success: function () {
                    $('#deleteUserModal').modal('hide');
                    location.reload();
                },
                error: function () {
                    alert('Không thể xóa dữ liệu khách hàng.');
                }
            });
        });

        // Submit form
        $('#editForm').on('submit', function (e) {
            e.preventDefault();

            var userData = {
                userId: $('#editUserId').val(),
                fullName: $('#editFullName').val(),
                username: $('#editUserName').val(),
                email: $('#editEmail').val(),
                phoneNumber: $('#editPhoneNumber').val(),
                address: $('#editAddress').val(),
                roleId: $('#editRoleId').val()
            };


            $.ajax({
                url: '/user/update/' + userData.userId,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(userData),
                success: function () {
                    $('#editUserModal').modal('hide');
                    location.reload();
                },
                error: function () {
                    alert('Cập nhật thất bại.');
                }
            });
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
<script src="/admin/assets/demo/chart-area-demo.js"></script>
<script src="/admin/assets/demo/chart-bar-demo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/datatables-simple-demo.js"></script>
</body>
</html>

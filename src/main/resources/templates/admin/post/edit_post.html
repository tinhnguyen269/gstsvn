<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm bài viết mới</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>

    <!-- CKEditor -->
    <script src="https://cdn.ckeditor.com/ckeditor5/41.3.1/classic/ckeditor.js"></script>

</head>
<body class="sb-nav-fixed">

<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <!-- Sidebar -->
    <div th:replace="admin/common/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div id="layoutSidenav_content">
        <main class="container py-4">
            <div class="card shadow-sm rounded-4">
                <div class="card-header bg-success text-white rounded-top-4">
                    <h3 class="mb-0">📝 Sửa bài viết</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{'/admin/post/update/' + ${post.postId}}" th:object="${post}" method="post">

                        <div class="mb-3">
                            <label for="title" class="form-label">Tiêu đề</label>
                            <input type="text" th:field="*{title}" class="form-control form-control-lg rounded-3"
                                   id="title" placeholder="Nhập tiêu đề bài viết" required>
                        </div>
                        <div class="mb-3">
                            <label for="imageUpload" class="form-label">Ảnh bài viết</label>
                            <input class="form-control" type="file" id="imageUpload" accept="image/*" onchange="uploadImage(event)">
                            <div class="mt-3">
                                <img id="previewImage"
                                     th:src="${post.imageUrl}"
                                     alt="Preview"
                                     style="width: 150px; height: auto; border: 1px solid #ddd; border-radius: 8px;"
                                     class="shadow-sm"
                                     th:if="${post.imageUrl != null}"/>
                            </div>
                            <input type="hidden" th:field="*{imageUrl}" id="imageUrl"/>
                        </div>


                        <div class="mb-3">
                            <label for="contentEditor" class="form-label">Nội dung</label>
                            <textarea id="contentEditor" th:field="*{content}" class="form-control" rows="8"></textarea>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-success btn-sm rounded-pill px-4">💾 Cập nhật</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-4"
                                    onclick="confirmBack()">⬅️ Quay lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CKEditor Config -->
<script>
    // Lấy CSRF token và header name từ meta
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    ClassicEditor
        .create(document.querySelector('#contentEditor'), {
            toolbar: [
                'heading', '|',
                'bold', 'italic', 'underline', 'link', '|',
                'bulletedList', 'numberedList', '|',
                'blockQuote', 'insertTable', 'imageUpload', 'mediaEmbed', '|',
                'undo', 'redo'
            ]
        })
        .then(editor => {
            editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
                return new MyUploadAdapter(loader);
            };
        })
        .catch(error => {
            console.error(error);
        })


    class MyUploadAdapter {
        constructor(loader) {
            this.loader = loader;
        }

        upload() {
            return this.loader.file
                .then(file => new Promise((resolve, reject) => {
                    const formData = new FormData();
                    formData.append('upload', file);

                    fetch('/admin/uploadImage', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            [csrfHeader]: csrfToken // Gửi CSRF token
                        }
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.uploaded === 1) {
                                resolve({
                                    default: data.url
                                });
                            } else {
                                reject(data.error?.message || 'Upload thất bại');
                            }
                        })
                        .catch(err => {
                            reject('Lỗi upload: ' + err);
                        });
                }));
        }
    }

    // Upload ảnh ngoài CKEditor (preview ảnh bìa)
    function uploadImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("upload", file);

        fetch("/admin/uploadImage", {
            method: "POST",
            body: formData,
            headers: {
                [csrfHeader]: csrfToken // Gửi CSRF token
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.url) {
                    document.getElementById("previewImage").src = data.url;
                    document.getElementById("previewImage").style.display = "block";
                    document.getElementById("imageUrl").value = data.url;
                } else {
                    alert("Upload thất bại: " + (data.error || "Không rõ nguyên nhân"));
                }
            })
            .catch(error => {
                console.error(error);
                alert("Có lỗi khi upload ảnh.");
            });
    }

    function confirmBack() {
        if (confirm("Bạn có chắc muốn quay lại mà không lưu bài viết?")) {
            window.location.href = "/admin/post/list";
        }
    }
</script>

<!-- Optional Custom JS -->
<script src="/admin/js/scripts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
<script src="/admin/assets/demo/chart-area-demo.js"></script>
<script src="/admin/assets/demo/chart-bar-demo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/datatables-simple-demo.js"></script>
</body>
</html>

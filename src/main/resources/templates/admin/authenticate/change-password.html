<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Đổi mật khẩu</title>
    <th:block th:replace="admin/common/header :: header"></th:block>
</head>
<body>
<div id="layoutSidenav">
    <!-- Main Content -->
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-3 px-md-4 mt-4">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-10 col-lg-6">
                        <div class="card shadow-lg border-0 rounded-lg">
                            <div class="card-header">
                                <h3 class="text-center">Đổi mật khẩu</h3>
                            </div>
                            <div class="card-body">
                                <!-- Thông báo lỗi -->
                                <div class="alert alert-danger" th:if="${error != null}" role="alert">
                                    <i class="fas fa-exclamation-circle me-2"></i>
                                    <span th:text="${error}"></span>
                                </div>
                                
                                <form th:action="@{/admin/change-password}" method="post" th:object="${changePasswordDTO}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    
                                    <div class="form-floating mb-3">
                                        <input class="form-control" type="password" th:field="*{oldPassword}"
                                               placeholder="Mật khẩu cũ" required/>
                                        <label>Mật khẩu cũ</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('oldPassword')}"
                                             th:errors="*{oldPassword}"></div>
                                    </div>
                                    
                                    <div class="form-floating mb-3">
                                        <input class="form-control" type="password" th:field="*{newPassword}"
                                               placeholder="Mật khẩu mới" required/>
                                        <label>Mật khẩu mới</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}"
                                             th:errors="*{newPassword}"></div>
                                    </div>
                                    
                                    <div class="form-floating mb-3">
                                        <input class="form-control" type="password" th:field="*{passwordConfirmation}"
                                               placeholder="Xác nhận mật khẩu mới" required/>
                                        <label>Xác nhận mật khẩu mới</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('passwordConfirmation')}"
                                             th:errors="*{passwordConfirmation}"></div>
                                    </div>
                                    
                                    <div class="d-flex justify-content-end mt-4">
                                        <a class="btn btn-secondary me-2" href="javascript:history.back()">Hủy</a>
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-key me-2"></i>Đổi mật khẩu
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>

<!-- Modal thông báo thành công -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="successModalLabel">
                    <i class="fas fa-check-circle me-2"></i>Thành công
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p th:text="${successMessage != null ? successMessage : 'Đổi mật khẩu thành công!'}"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="redirectToLogin()">Xác nhận</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Hiển thị modal khi đổi mật khẩu thành công
    document.addEventListener('DOMContentLoaded', function() {
        var showModal = /*[[${showSuccessModal}]]*/ false;
        if (showModal) {
            var modalElement = document.getElementById('successModal');
            if (modalElement) {
                var modal = new bootstrap.Modal(modalElement);
                modal.show();
            }
        }
    });

    // Hàm redirect về trang login
    function redirectToLogin() {
        window.location.href = /*[[@{/login}]]*/ '/login';
    }
</script>
</body>
</html>

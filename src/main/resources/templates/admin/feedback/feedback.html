<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin-phản hồi</title>
    <th:block th:replace="admin/common/header :: header"></th:block>

</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar:: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row">
                            <div class="col-sm-6">
                                <h2>Quản lí <b>phản hồi</b></h2>
                            </div>
                            <div class="col-sm-12 d-flex justify-content-end">
                                <div class="input-group me-2" style="width: 250px;">
                                    <form th:action="@{/admin/feedback/list}" method="get" class="d-flex me-2"
                                          style="width: 300px;">
                                        <input class="form-control me-2" type="text" name="keyword"
                                               placeholder="Tìm khách hàng..."
                                               th:value="${keyword}" aria-label="Search">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                                <a href="#addFeedbackModal" class="btn btn-success" data-toggle="modal"><i
                                        class="material-icons">&#xE147;</i> <span>Thêm mới</span></a>
                            </div>
                        </div>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên khách hàng</th>
                            <th>Nội dung đánh giá</th>
                            <th>Link youtube</th>
                            <th>Ngày tạo</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="feedback : ${feedbackPage.content}">
                            <td th:text="${feedback.feedbackId}"></td>
                            <td th:text="${feedback.nameCustomer}"></td>
                            <td th:text="${feedback.content}"></td>
                            <td th:text="${feedback.linkYoutube}"></td>
                            <td th:text="${#temporals.format(feedback.updateAt != null ? feedback.updateAt : feedback.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a href="#editFeedbackModal"
                                   class="edit"
                                   th:data-id="${feedback.feedbackId}"
                                   data-toggle="modal">
                                    <i class="material-icons" data-toggle="tooltip" title="Edit">&#xE254;</i>
                                </a>

                                <a href="#deleteFeedbackModal" class="delete" data-toggle="modal"
                                   th:data-id="${feedback.feedbackId}"
                                ><i
                                        class="material-icons" data-toggle="tooltip" title="Delete">&#xE872;</i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center">
                            <!-- Previous -->
                            <li class="page-item" th:classappend="${feedbackPage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/feedback/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, feedbackPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/feedback/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}">1</a>
                            </li>

                            <!-- Next -->
                            <li class="page-item" th:classappend="${feedbackPage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/feedback/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>
            <!-- Edit Modal HTML -->
            <div id="addFeedbackModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form method="post" th:action="@{/admin/feedback/add}" th:object="${feedbackNew}">
                            <div class="modal-header">
                                <h4 class="modal-title">Thêm phản hồi</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                                </button>
                            </div>
                            <div class="modal-body">
                                <div class="form-group">
                                    <label>Tên khách hàng</label>
                                    <input th:field="*{nameCustomer}" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Nội dung đánh giá</label>
                                    <input th:field="*{content}" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Link youtube</label>
                                    <input th:field="*{linkYoutube}" class="form-control" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Hủy">
                                <input type="submit" class="btn btn-success" value="Thêm">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Edit Modal HTML -->
            <div id="editFeedbackModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="editForm">
                            <div class="modal-header">
                                <h4 class="modal-title">Chỉnh sửa phản hồi</h4>
                                <button type="button" class="close" data-dismiss="modal">&times;</button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="editFeedbackId" id="editFeedbackId">
                                <div class="form-group">
                                    <label>Tên khách hàng</label>
                                    <input name="editNameCustomer" id="editNameCustomer" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Nội dung</label>
                                    <input name="editContent" id="editContent" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Link youtube</label>
                                    <input name="editLinkYoutube" id="editLinkYoutube" class="form-control" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div id="deleteFeedbackModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="deleteForm">
                            <input type="hidden" id="deleteFeedbackId" name="deleteFeedbackId">
                            <div class="modal-header">
                                <h4 class="modal-title">Xóa phản hồi</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                                </button>
                            </div>
                            <div class="modal-body">
                                <p>Bạn có chắc muốn xóa phản hòi này không?</p>
                                <p class="text-warning"><small>Đây là hành động không thể khôi phục.</small></p>
                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Hủy">
                                <input type="submit" class="btn btn-danger" value="Xóa">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script>
    $(document).ready(function () {
        // Khi bấm vào nút sửa
        $('.edit').on('click', function () {
            var feedbackId = $(this).data('id');
            $.ajax({
                url: '/admin/feedback/edit/' + feedbackId,
                type: 'GET',
                success: function (data) {
                    // Fill data vào form
                    $('#editFeedbackId').val(data.feedbackId);
                    $('#editNameCustomer').val(data.nameCustomer);
                    $('#editContent').val(data.content);
                    $('#editLinkYoutube').val(data.linkYoutube);
                },
                error: function () {
                    alert('Không thể lấy dữ liệu khách hàng.');
                }
            });
        });

        $('.delete').on('click', function () {
            var feedbackId = $(this).data('id');
            $('#deleteFeedbackId').val(feedbackId);
        });


        $('#deleteForm').on('submit', function (e) {
            e.preventDefault();
            var feedbackId = $('#deleteFeedbackId').val();
            $.ajax({
                url: '/admin/feedback/delete/' + feedbackId,
                type: 'POST',
                success: function () {
                    $('#deleteFeedbackModal').modal('hide');
                    location.reload();
                },
                error: function () {
                    alert('Không thể xóa dữ liệu phản hồi.');
                }
            });
        });

        // Submit form
        $('#editForm').on('submit', function (e) {
            e.preventDefault();

            var feedbackData = {
                feedbackId: $('#editFeedbackId').val(),
                nameCustomer: $('#editNameCustomer').val(),
                content: $('#editContent').val(),
                linkYoutube: $('#editLinkYoutube').val(),
            };

            $.ajax({
                url: '/admin/feedback/update/' + feedbackData.feedbackId,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(feedbackData),
                success: function () {
                    $('#editFeedbackModal').modal('hide');
                    location.reload(); // hoặc load lại dữ liệu bằng AJAX
                },
                error: function () {
                    alert('Cập nhật thất bại.');
                }
            });
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
<script src="/admin/assets/demo/chart-area-demo.js"></script>
<script src="/admin/assets/demo/chart-bar-demo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/datatables-simple-demo.js"></script>
</body>
</html>

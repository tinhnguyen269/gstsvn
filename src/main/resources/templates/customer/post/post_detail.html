<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(
    ${post.title},
    ~{::styles},
    ~{::meta}
)">
    <th:block th:fragment="meta">
        <!-- ✅ SEO Meta Tags -->
        <meta name="description" th:content="${post.title + ' - Cập nhật thông tin, tin tức và chia sẻ từ GSTS'}">
        <meta name="robots" content="index, follow">
        <link rel="canonical" th:href="${canonicalUrl}">

        <!-- ✅ Open Graph -->
        <meta property="og:type" content="article">
        <meta property="og:title" th:content="${post.title}">
        <meta property="og:description" th:content="${post.title + ' - Cập nhật thông tin từ GSTS'}">
        <meta property="og:image" th:content="${post.imageUrl}">
        <meta property="og:url" th:content="${canonicalUrl}">
        <meta property="og:site_name" content="GSTS">

        <!-- ✅ Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" th:content="${post.title}">
        <meta name="twitter:description" th:content="${post.title + ' - Cập nhật thông tin từ GSTS'}">
        <meta name="twitter:image" th:content="${post.imageUrl}">

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "BlogPosting",
                "headline": "[[${post.title}]]",
                "description": "[[${post.title}]]",
                "image": "[[${post.imageUrl}]]",
                "author": {
                    "@type": "Person",
                    "name": "Nguyễn Văn Tính"
                },
                "publisher": {
                    "@type": "Organization",
                    "name": "Công ty Vệ Sinh GSTS",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png"
                    }
                },
                "datePublished": "[[${post.createAt}]]",
                "dateModified": "[[${post.createAt}]]",
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": "https://gstsvn.onrender.com/tin-tuc/[[${post.slug}]]"
                }
            }
        </script>
    </th:block>
    <th:block th:fragment="styles">
        <link href="/customer/css/post-detail.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    </th:block>
</head>


<body class="d-flex flex-column min-vh-100">
<div th:replace="customer/common/navbar:: header"></div>

<!-- Nội dung chính -->
<main class="container mt-5 pt-4 flex-grow-1">
    <div class="row">
        <h1 class="visually-hidden">Tin tức GSTS - [[${post.title}]]</h1>
        <div class="col-12 col-md-8 mb-5" data-aos="fade-up">
            <nav aria-label="breadcrumb" class="pt-4 mt-1">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item">
                        <a th:href="@{/}" class="text-decoration-none">Trang chủ</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/tin-tuc}" class="text-decoration-none">Tin tức</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${post.title}"></li>
                </ol>
            </nav>
            <div class="text-muted mb-3">
                <i class="fa-regular fa-clock me-1"></i>
                <span th:text="${post.updateAt != null ? dateFormatter.format(post.updateAt) : dateFormatter.format(post.createAt)}"></span>
            </div>
            <article class="article-content" th:utext="${post.content}"></article>
        </div>
        <aside class="col-12 col-md-4">
            <div class="sidebar mb-4" th:replace="customer/common/sidebar :: sidebarService" data-aos="fade-up" data-aos-delay="200"></div>
            <div class="sidebar" th:replace="customer/common/sidebar :: sidebarPost" data-aos="fade-up" data-aos-delay="300"></div>
        </aside>
    </div>
    <section class="mt-5" th:replace="customer/common/post :: post"></section>

    <section class="mt-5" th:replace="customer/common/contact :: contact"></section>
</main>

<!-- Button scroll head -->
<div th:replace="customer/common/scroll_head:: scroll-head"></div>

<!-- Footer -->
<footer th:replace="customer/common/footer :: footer"></footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 800,
    once: true
  });
</script>
<script src="/customer/js/common.js"></script>

</body>
</html>

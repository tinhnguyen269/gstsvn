<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Login - SB Admin</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dyeje8mx3/image/upload/v1755924095/gsts-logo_ll5vaz.png">

    <link th:href="@{/admin/css/styles.css}" rel="stylesheet"/>
    <script th:src="@{https://use.fontawesome.com/releases/v6.3.0/js/all.js}" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-center font-weight-light my-4">Đăng nhập</h3></div>
                            <div class="card-body">
                                <form th:action="@{/login}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputUserName" type="text" name="username"
                                               placeholder="Username" required/>
                                        <label for="inputUserName">Tên đăng nhập</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputPassword" type="password" name="password"
                                               placeholder="Password" required/>
                                        <label for="inputPassword">Mật khẩu</label>
                                    </div>
<!--                                    <div class="form-check mb-3">-->
<!--                                        <input class="form-check-input" id="inputRememberPassword" type="checkbox" value=""/>-->
<!--                                        <label class="form-check-label" for="inputRememberPassword">Ghi nhớ</label>-->
<!--                                    </div>-->
                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a class="small" th:href="@{/forgot-password}">Quên mật khẩu?</a>
                                        <button class="btn btn-primary" type="submit">Login</button>
                                    </div>
                                </form>
                                <p th:text="${message}" style="color: red"></p>
                                <p th:if="${param.error}" style="color: red">
                                    Sai tên đăng nhập hoặc mật khẩu!
                                </p>
                            </div>
                            <div class="card-footer text-center py-3">
                                <div class="small"><a th:href="@{/register}">Chưa có tài khoản? Đăng kí!</a></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js}"
        crossorigin="anonymous"></script>
<script th:src="@{/admin/js/scripts.js}"></script>
</body>
</html>

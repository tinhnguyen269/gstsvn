<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Dashboard - SB Admin</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>

</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar:: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row">
                            <div class="col-sm-6">
                                <h2>Quản lí <b>khách hàng</b></h2>
                            </div>
                            <div class="col-sm-12 d-flex justify-content-end">
                                <div class="input-group me-2" style="width: 250px;">
                                    <form th:action="@{/admin/contact/list}" method="get" class="d-flex me-2"
                                          style="width: 300px;">
                                        <input class="form-control me-2" type="text" name="keyword"
                                               placeholder="Tìm khách hàng..."
                                               th:value="${keyword}" aria-label="Search">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                                <a href="#addContactModal" class="btn btn-success" data-toggle="modal"><i
                                        class="material-icons">&#xE147;</i> <span>Thêm mới</span></a>
                            </div>
                        </div>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Số điện thoại</th>
                            <th>Dịch vụ</th>
                            <th>Ghi chú</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="customer : ${customerPage.content}">
                            <td th:text="${customer.customerId}"></td>
                            <td th:text="${customer.name}"></td>
                            <td th:text="${customer.phoneNumber}"></td>
                            <td th:text="${serviceMap[customer.serviceId]}"></td>
                            <td th:text="${customer.context}"></td>
                            <td th:text="${customer.status.status}"></td>
                            <td th:text="${#temporals.format(customer.updateAt != null ? customer.updateAt : customer.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a href="#editContactModal"
                                   class="edit"
                                   th:data-id="${customer.customerId}"
                                   data-toggle="modal">
                                    <i class="material-icons" data-toggle="tooltip" title="Edit">&#xE254;</i>
                                </a>

                                <a href="#deleteContactModal" class="delete" data-toggle="modal"
                                   th:data-id="${customer.customerId}"
                                ><i
                                        class="material-icons" data-toggle="tooltip" title="Delete">&#xE872;</i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center">
                            <!-- Previous -->
                            <li class="page-item" th:classappend="${customerPage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/contact/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, customerPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/contact/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}">1</a>
                            </li>

                            <!-- Next -->
                            <li class="page-item" th:classappend="${customerPage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/contact/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>
            <!-- Add Modal HTML -->
            <div id="addContactModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="addForm">
                            <div class="modal-header">
                                <h4 class="modal-title">Thêm khách hàng</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                            </div>
                            <div class="modal-body">
                                <!-- Tên -->
                                <div class="form-group">
                                    <label>Tên</label>
                                    <input name="addName" id="addName" class="form-control"
                                           required maxlength="100"
                                           title="Tên không được để trống và tối đa 100 ký tự.">
                                </div>

                                <!-- Số điện thoại -->
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input name="addPhoneNumber" id="addPhoneNumber" class="form-control"
                                           required pattern="^0\d{9}$"
                                           title="Số điện thoại phải bắt đầu bằng 0 và có đúng 10 chữ số.">
                                </div>

                                <!-- Dịch vụ -->
                                <div class="form-group">
                                    <label>Dịch vụ</label>
                                    <select name="addServiceId" id="addServiceId" class="form-control" required>
                                        <option value="">-- Chọn dịch vụ --</option>
                                        <option th:each="service : ${services}"
                                                th:value="${service.serviceId}"
                                                th:text="${service.serviceName}"></option>
                                    </select>
                                </div>

                                <!-- Ghi chú -->
                                <div class="form-group">
                                    <label>Ghi chú</label>
                                    <textarea name="addContext" id="addContext" class="form-control"
                                              maxlength="1000"
                                              title="Nội dung không được vượt quá 1000 ký tự."></textarea>
                                </div>

                                <!-- Trạng thái -->
                                <div class="form-group">
                                    <label>Trạng thái</label>
                                    <select name="addStatus" id="addStatus" class="form-control" required>
                                        <option value="">-- Chọn trạng thái --</option>
                                        <option th:value="PENDING">Chờ liên hệ</option>
                                        <option th:value="APPROVED">Đã liên hệ</option>
                                        <option th:value="REJECTED">Hủy bỏ</option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
                                <input type="submit" class="btn btn-success" value="Add">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Edit Modal HTML -->
            <div id="editContactModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="editForm">
                            <div class="modal-header">
                                <h4 class="modal-title">Chỉnh sửa khách hàng</h4>
                                <button type="button" class="close" data-dismiss="modal">&times;</button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="editCustomerId" id="editCustomerId">
                                <div class="form-group">
                                    <label>Tên</label>
                                    <input name="editName" id="editName" class="form-control"
                                           required maxlength="100"
                                           title="Tên không được để trống và tối đa 100 ký tự."></div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input name="editPhoneNumber" id="editPhoneNumber" class="form-control"
                                           required pattern="^\d{10,11}$"
                                           title="Số điện thoại phải có 10 đến 11 chữ số."></div>
                                <div class="form-group">
                                    <label>Dịch vụ</label>
                                    <select name="editServiceId" id="editServiceId" class="form-control" required>
                                        <option th:each="service : ${services}"
                                                th:value="${service.serviceId}"
                                                th:text="${service.serviceName}"></option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Ghi chú</label>
                                    <textarea name="editContext" id="editContext" class="form-control"
                                              maxlength="1000"
                                              title="Nội dung không được vượt quá 1000 ký tự."></textarea></div>
                                <div class="form-group">
                                    <label>Trạng thái</label>
                                    <select name="editStatus" id="editStatus" class="form-control" required>
                                        <option value="">-- Chọn trạng thái --</option>
                                        <option value="PENDING">Chờ liên hệ</option>
                                        <option value="APPROVED">Đã liên hệ</option>
                                        <option value="REJECTED">Hủy bỏ</option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div id="deleteContactModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="deleteForm">
                            <input type="hidden" id="deleteCustomerId" name="deleteCustomerId">
                            <div class="modal-header">
                                <h4 class="modal-title">Xóa khách hàng</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                                </button>
                            </div>
                            <div class="modal-body">
                                <p>Are you sure you want to delete these Records?</p>
                                <p class="text-warning"><small>This action cannot be undone.</small></p>
                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
                                <input type="submit" class="btn btn-danger" value="Delete">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script>
    $(document).ready(function () {
        // Lấy CSRF token và header name từ meta
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        // Submit form add
        $('#addForm').on('submit', function (e) {
            e.preventDefault();

            var customerData = {
                name: $('#addName').val(),
                phoneNumber: $('#addPhoneNumber').val(),
                serviceId: $('#addServiceId').val(),
                context: $('#addContext').val(),
                status: $('#addStatus').val()
            };

            $.ajax({
                url: '/admin/contact/add',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(customerData),
                headers: {
                    [csrfHeader]: csrfToken // Gửi CSRF token
                },
                success: function () {
                    $('#addContactModal').modal('hide');
                    alert('Thêm khách hàng thành công!');
                    location.reload();
                },
                error: function (xhr) {
                    if (xhr.status === 400) {
                        const errors = xhr.responseJSON;
                        let errorMsg = 'Lỗi xác thực:\n';
                        for (const key in errors) {
                            errorMsg += `- ${errors[key]}\n`;
                        }
                        alert(errorMsg);
                    } else {
                        alert('Thêm khách hàng thất bại.');
                    }
                }
            });
        });

        // Khi bấm vào nút sửa
        $('.edit').on('click', function () {
            var customerId = $(this).data('id');
            $.ajax({
                url: '/admin/contact/edit/' + customerId,
                type: 'GET',
                headers: {
                    [csrfHeader]: csrfToken // Gửi CSRF token
                },
                success: function (data) {
                    // Fill data vào form
                    $('#editCustomerId').val(data.customerId);
                    $('#editName').val(data.name);
                    $('#editPhoneNumber').val(data.phoneNumber);
                    $('#editServiceId').val(data.serviceId);
                    $('#editContext').val(data.context);
                    $('#editStatus').val(data.status);
                },
                error: function () {
                    alert('Không thể lấy dữ liệu khách hàng.');
                }
            });
        });

        $('.delete').on('click', function () {
            var customerId = $(this).data('id');
            $('#deleteCustomerId').val(customerId);
        });


        $('#deleteForm').on('submit', function (e) {
            e.preventDefault(); // tránh submit form thật
            var customerId = $('#deleteCustomerId').val();
            $.ajax({
                url: '/admin/contact/delete/' + customerId,
                type: 'POST',
                headers: {
                    [csrfHeader]: csrfToken // Gửi CSRF token
                },
                success: function () {
                    $('#deleteContactModal').modal('hide');
                    alert('Xóa khách hàng thành công!');
                    location.reload();
                },
                error: function () {
                    alert('Không thể xóa dữ liệu khách hàng.');
                }
            });
        });

        // Submit form edit
        $('#editForm').on('submit', function (e) {
            e.preventDefault();

            var customerData = {
                customerId: $('#editCustomerId').val(),
                name: $('#editName').val(),
                phoneNumber: $('#editPhoneNumber').val(),
                serviceId: $('#editServiceId').val(),
                context: $('#editContext').val(),
                status: $('#editStatus').val()
            };

            $.ajax({
                url: '/admin/contact/update/' + customerData.customerId,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(customerData),
                headers: {
                    [csrfHeader]: csrfToken // Gửi CSRF token
                },
                success: function (res) {
                    $('#editContactModal').modal('hide');
                    alert('Cập nhật khách hàng thành công!');
                    location.reload();
                },
                error: function (xhr) {
                    if (xhr.status === 400 && xhr.responseJSON) {
                        // Hiển thị lỗi từ server
                        let errors = xhr.responseJSON;
                        let messages = Object.values(errors).join('\n');
                        alert("Cập nhật thất bại:\n" + messages);
                    } else {
                        alert('Đã xảy ra lỗi khi cập nhật.');
                    }
                }
            });
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/datatables-simple-demo.js"></script>
</body>
</html>

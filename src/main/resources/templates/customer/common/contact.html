<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Buttons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .circle-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .circle-button:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }

        .circle-button i {
            font-size: 24px;
        }

        .circle-button.zalo {
            background-color: #008fe5;
        }

        .circle-button.facebook {
            background-color: #1877f2;
        }

        .circle-button.phone {
            background-color: #28a745;
        }

        @media (max-width: 576px) {
            .circle-button {
                width: 50px;
                height: 50px;
            }

            .circle-button i {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="contact-buttons d-flex flex-column gap-3 position-fixed"
     style="bottom: 20px; right: 20px; z-index: 1000;"
     th:fragment="contact">

    <a href="https://zalo.me/0769270xxx" target="_blank" class="circle-button zalo">
        <i class="fas fa-comment-dots"></i>
    </a>

    <a href="https://www.facebook.com/trongtudonghoa" target="_blank" class="circle-button facebook">
        <i class="fab fa-facebook-messenger"></i>
    </a>

    <a href="tel:0769270xxx" class="circle-button phone">
        <i class="fas fa-phone-alt"></i>
    </a>
</div>

</body>
</html>

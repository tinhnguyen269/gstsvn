<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moso Interior - Product Detail Page</title>

    <!-- CSS FILES -->
    <link href="/customer/css/common.css" rel="stylesheet" />
    <link href="/customer/css/service-detail.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>

<body class="shop-detail-page">

<div th:replace="customer/common/header::header"></div>

<!-- Content + Sidebar -->
<div class="container">
    <div class="row">
        <!-- Content chính -->
        <main class="col-12 col-md-8 order-2 order-md-1 service-main">
            <nav aria-label="breadcrumb" class="pt-4 mt-5">
                <ol class="breadcrumb bg-transparent p-0 mb-4">
                    <li class="breadcrumb-item"><a th:href="@{/home}" class="text-decoration-none">Trang chủ</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Dịch vụ</li>
                </ol>
            </nav>

            <div class="article-content" th:utext="${services.content}">
            </div>
        </main>

        <!-- Sidebar -->
        <aside class="col-12 col-md-4 order-1 order-md-2" th:replace="customer/common/sidebar :: sidebar"></aside>
    </div>

    <!-- Button contact -->
    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>
</div>

<div th:replace="customer/common/footer :: footer"></div>

<!-- JAVASCRIPT FILES -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(${services.serviceName}, ~{::styles})">
    <styles>
        <link href="/customer/css/service-detail.css" rel="stylesheet" />
    </styles>

    <!-- ✅ SEO META -->
    <meta name="description" th:content="${services.metaDescription}">
    <meta name="keywords" th:content="${services.metaKeywords}">
    <meta property="og:title" th:content="${services.serviceName}">
    <meta property="og:description" th:content="${services.metaDescription}">
    <meta property="og:image" th:content="${services.imgService}">
    <meta property="og:url" th:content="@{'/dich-vu/' + ${services.slug}}">
    <meta property="og:type" content="article">

</head>

<body class="d-flex flex-column min-vh-100">

<!-- ✅ HEADER -->
<header th:replace="customer/common/navbar::header"></header>

<!-- ✅ MAIN CONTENT -->
<main class="container mt-5 pt-4">
    <div class="row">
        <!-- Thẻ H1 chính -->
        <h1 class="visually-hidden">Dịch vụ GSTS - [[${services.serviceName}]]</h1>
        <!-- ✅ Cột nội dung chính -->
        <article class="col-12 col-md-8 order-1 order-md-1 service-main">

            <!-- ✅ Breadcrumb với schema -->
            <nav aria-label="breadcrumb" itemscope itemtype="https://schema.org/BreadcrumbList" class="pt-3">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                        <a th:href="@{/}" itemprop="item" class="text-decoration-none text-dark">
                            <span itemprop="name">Trang chủ</span>
                        </a>
                        <meta itemprop="position" content="1"/>
                    </li>
<!--                    <li class="breadcrumb-item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">-->
<!--                        <a th:href="@{/dich-vu}" itemprop="item" class="text-decoration-none text-dark">-->
<!--                            <span itemprop="name">Dịch vụ</span>-->
<!--                        </a>-->
<!--                        <meta itemprop="position" content="2"/>-->
<!--                    </li>-->
                    <li class="breadcrumb-item active text-dark" aria-current="page"
                        itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                        <span itemprop="name" th:text="${services.serviceName}"></span>
                        <meta itemprop="position" content="3"/>
                    </li>
                </ol>
            </nav>

            <!-- ✅ Nội dung dịch vụ -->
            <section class="article-content" th:utext="${services.content}"></section>

            <!-- ✅ Bài viết liên quan -->
            <div class="mt-5" th:replace="customer/common/post :: post"></div>
        </article>

        <!-- ✅ Sidebar -->
        <aside class="col-12 col-md-4 order-2 order-md-2">
            <div class="mb-4" th:replace="customer/common/sidebar :: sidebarService"></div>
            <div th:replace="customer/common/sidebar :: sidebarPost"></div>
        </aside>
    </div>

    <!-- ✅ Liên hệ -->
    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>

    <!-- ✅ Scroll-to-top -->
    <div th:replace="customer/common/scroll_head:: scroll-head"></div>
</main>

<!-- ✅ FOOTER -->
<footer th:replace="customer/common/footer :: footer"></footer>

<!-- ✅ JAVASCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/customer/js/common.js"></script>

<!-- ✅ SCHEMA.ORG JSON-LD -->
<script type="application/ld+json" th:inline="javascript">
    {
        "@context": "https://schema.org",
        "@type": "Service",
        "name": [[${services.serviceName}]],
        "description": [[${services.metaDescription}]],
        "provider": {
            "@type": "LocalBusiness",
            "name": "GSTS",
            "image": "https://gstsvn.onrender.com/customer/images/logo.png",
            "url": "https://gstsvn.onrender.com"
        },
        "areaServed": {
            "@type": "Place",
            "name": "Việt Nam"
        },
        "serviceType": [[${services.serviceName}]],
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": [[@{'/dich-vu/' + ${services.slug}}]]
        }
    }
</script>
</body>
</html>

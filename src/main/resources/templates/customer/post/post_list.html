<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(
    'Tin tức - GSTS | Kiến thức & mẹo vệ sinh công nghiệp mới nhất',
    ~{::styles},
    ~{::meta}
)">
    <!-- ✅ Meta riêng cho trang Tin tức -->
    <th:block th:fragment="meta">
        <meta name="description"
              content="Trang tin tức GSTS cập nhật kiến thức, kinh nghiệm và mẹo vệ sinh công nghiệp mới nhất. Tư vấn giải pháp vệ sinh nhà ở, văn phòng, nhà xưởng hiệu quả và an toàn.">
        <meta name="keywords"
              content="tin tức vệ sinh công nghiệp, mẹo làm sạch, kiến thức vệ sinh, GSTS, dịch vụ vệ sinh, vệ sinh nhà xưởng, vệ sinh văn phòng">
        <meta name="robots" content="index, follow">

        <!-- ✅ Canonical URL -->
        <link rel="canonical" th:href="${canonicalUrl}"/>

        <!-- ✅ Open Graph (Facebook, Zalo, LinkedIn) -->
        <meta property="og:title" content="Tin tức - GSTS | Kiến thức & mẹo vệ sinh công nghiệp mới nhất">
        <meta property="og:description"
              content="Cập nhật tin tức và mẹo vệ sinh công nghiệp mới nhất từ GSTS. Giải pháp vệ sinh an toàn, hiệu quả, tiết kiệm.">
        <meta property="og:type" content="website">
        <meta property="og:url" th:content="${canonicalUrl}">
        <meta property="og:image"
              content="https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png">
        <meta property="og:locale" content="vi_VN">
        <meta property="og:site_name" content="GSTS">

        <!-- ✅ Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Tin tức - GSTS | Kiến thức & mẹo vệ sinh công nghiệp mới nhất">
        <meta name="twitter:description"
              content="GSTS chia sẻ tin tức và kinh nghiệm vệ sinh công nghiệp hiệu quả, giúp bạn giữ không gian luôn sạch sẽ và an toàn.">
        <meta name="twitter:image"
              content="https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png">

        <!-- ✅ Cấu trúc dữ liệu JSON-LD (SEO nâng cao cho trang tin) -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "NewsMediaOrganization",
                "name": "GSTS - Tin tức vệ sinh công nghiệp",
                "url": "https://gstsvn.onrender.com/tin-tuc",
                "logo": "https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png",
                "sameAs": [
                    "https://www.facebook.com/gstsvn.onrender.com",
                    "https://www.linkedin.com/company/gsts-vietnam"
                ]
            }
        </script>
    </th:block>
    <!-- ✅ CSS riêng -->
    <th:block th:fragment="styles">
        <link href="/customer/css/home.css" rel="stylesheet">
        <link href="/customer/css/post-list.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    </th:block>
</head>

<body class="shop-detail-page d-flex flex-column min-vh-100">
<!-- HEADER -->
<header th:replace="customer/common/navbar::header"></header>

<!-- NỘI DUNG CHÍNH -->
<main class="flex-grow-1">
    <div class="container mt-5 pt-4">
        <!-- Thẻ H1: chỉ có 1, đại diện tiêu đề chính của trang -->
        <h1 class="visually-hidden">Tin tức mới nhất từ GSTS</h1>

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="pt-4 mt-1">
            <ol class="breadcrumb bg-transparent p-0 mb-3">
                <li class="breadcrumb-item">
                    <a th:href="@{/}" class="text-decoration-none text-dark">Trang chủ</a>
                </li>
                <li class="breadcrumb-item active text-dark" aria-current="page">Tin tức</li>
            </ol>
        </nav>

        <!-- Danh sách bài viết -->
        <section class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4" aria-label="Danh sách bài viết tin tức">
            <article th:each="post : ${Post}" class="col" data-aos="fade-up">
                <div class="news-card h-100 border-0 shadow-sm overflow-hidden">
                    <a th:href="@{/tin-tuc/{slug}(slug=${post.slug})}" class="text-decoration-none text-dark">
                        <img th:src="${post.imageUrl}" th:alt="${post.title}"
                             alt="Tin tức"
                             class="img-fluid w-100">
                    </a>
                    <div class="p-3">
                        <h2 th:text="${post.title}"></h2>
                        <p class="text-muted mb-2"
                           th:text="${dateFormatter.format(post.createAt)}">
                        </p>

                        <a th:href="@{/tin-tuc/{slug}(slug=${post.slug})}"
                           class="btn btn-outline-success btn-sm"
                           aria-label="Xem chi tiết bài viết [[${post.title}]]">Xem chi tiết</a>
                    </div>
                </div>
            </article>
        </section>

        <!-- PHÂN TRANG -->
        <nav aria-label="Phân trang tin tức" class="mt-4">
            <ul class="pagination justify-content-center">

                <!-- Previous -->
                <li class="page-item mx-1" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link rounded-circle d-flex align-items-center justify-content-center"
                       style="width:40px; height:40px;"
                       th:href="@{/tin-tuc(page=${currentPage - 2})}"
                       aria-label="Trang trước">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <!-- Pages -->
                <li class="page-item mx-1"
                    th:each="page : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${page == currentPage} ? 'active'">
                    <a class="page-link rounded-circle d-flex align-items-center justify-content-center"
                       style="width:40px; height:40px;"
                       th:href="@{/tin-tuc(page=${page - 1})}"
                       th:text="${page}"
                       aria-label="Tới trang [[${page}]]">1</a>
                </li>

                <!-- Next -->
                <li class="page-item mx-1" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link rounded-circle d-flex align-items-center justify-content-center"
                       style="width:40px; height:40px;"
                       th:href="@{/tin-tuc(page=${currentPage})}"
                       aria-label="Trang sau">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Button contact & scroll -->
        <div th:replace="customer/common/contact :: contact"></div>
        <div th:replace="customer/common/scroll_head :: scroll-head"></div>
    </div>
</main>

<!-- FOOTER -->
<footer th:replace="customer/common/footer::footer"></footer>

<!-- JAVASCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 800,
    once: true
  });
</script>
<script src="/customer/js/home.js"></script>
<script src="/customer/js/common.js"></script>
</body>
</html>

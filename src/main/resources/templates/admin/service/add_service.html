<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm bài viết mới</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

    <!-- CKEditor -->
    <script src="https://cdn.ckeditor.com/4.22.1/full-all/ckeditor.js"></script>

    <!-- Custom CSS -->
    <link href="/admin/css/styles.css" rel="stylesheet"/>
</head>
<body class="sb-nav-fixed">

<!-- Header -->
<div th:replace="admin/common/header :: header"></div>

<div id="layoutSidenav">
    <!-- Sidebar -->
    <div th:replace="admin/common/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div id="layoutSidenav_content">
        <main class="container py-4">
            <div class="card shadow-sm rounded-4">
                <div class="card-header bg-success text-white rounded-top-4">
                    <h3 class="mb-0">📝 Thêm bài viết mới</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/service/save}" th:object="${service}" method="post">

                        <div class="mb-3">
                            <label for="title" class="form-label">Tiêu đề</label>
                            <input type="text" th:field="*{serviceName}" class="form-control form-control-lg rounded-3"
                                   id="title" placeholder="Nhập tên dịch vụ" required/>
                        </div>
                        <div class="mb-3">
                            <label for="iconUpload" class="form-label">Icon dịch vụ</label>
                            <input class="form-control" type="file" id="iconUpload" accept="image/*"
                                   onchange="uploadImage(event)"
                                   data-preview="iconPreview" data-url="iconUrl">
                            <div class="mt-3">
                                <img id="iconPreview" src="#" alt="Preview" style="max-height: 200px; display: none;" class="rounded shadow-sm"/>
                            </div>
                            <input type="hidden" th:field="*{icon}" id="iconUrl"/>
                        </div>

                        <div class="mb-3">
                            <label for="priceUpload" class="form-label">Image bảng giá</label>
                            <input class="form-control" type="file" id="priceUpload" accept="image/*"
                                   onchange="uploadImage(event)"
                                   data-preview="pricePreview" data-url="priceUrl">
                            <div class="mt-3">
                                <img id="pricePreview" src="#" alt="Preview" style="max-height: 200px; display: none;" class="rounded shadow-sm"/>
                            </div>
                            <input type="hidden" th:field="*{imgPrice}" id="priceUrl"/>
                        </div>



                        <div class="mb-3">
                            <label for="contentEditor" class="form-label">Nội dung</label>
                            <textarea id="contentEditor" th:field="*{content}" class="form-control" rows="8"></textarea>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-success btn-sm rounded-pill px-4">💾 Lưu</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-4"
                                    onclick="confirmBack()">⬅️ Quay lại
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CKEditor Config -->
<script>

    CKEDITOR.replace('contentEditor', {
        language: 'vi',
        height: 400,
        filebrowserUploadUrl: '/admin/service/uploadImage',
        filebrowserUploadMethod: 'form',
        removeButtons: '',
        toolbarGroups: [
            { name: 'clipboard',   groups: [ 'clipboard', 'undo' ] },
            { name: 'editing',     groups: [ 'find', 'selection', 'spellchecker' ] },
            { name: 'links' },
            { name: 'insert' },
            { name: 'forms' },
            { name: 'tools' },
            { name: 'document',    groups: [ 'mode', 'document', 'doctools' ] },
            { name: 'others' },
            '/',
            { name: 'basicstyles', groups: [ 'basicstyles', 'cleanup' ] },
            { name: 'paragraph',   groups: [ 'list', 'indent', 'blocks', 'align' ] },
            { name: 'styles' },
            { name: 'colors' },
            { name: 'about' }
        ]
    });
    function uploadImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const previewId = event.target.dataset.preview;
        const urlInputId = event.target.dataset.url;

        const formData = new FormData();
        formData.append("upload", file);

        fetch("/admin/uploadImage", {
            method: "POST",
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (data.uploaded === 1) {
                    document.getElementById(previewId).src = data.url;
                    document.getElementById(previewId).style.display = "block";
                    document.getElementById(urlInputId).value = data.url;
                } else {
                    alert("Upload thất bại: " + (data.error?.message || "Không rõ nguyên nhân"));
                }
            })
            .catch(error => {
                console.error(error);
                alert("Có lỗi khi upload ảnh.");
            });
    }


    function confirmBack() {
        if (confirm("Bạn có chắc muốn quay lại mà không lưu bài viết?")) {
            window.location.href = "/admin/service/list";
        }
    }
</script>

<!-- Optional Custom JS -->
<script src="/admin/js/scripts.js"></script>

</body>
</html>

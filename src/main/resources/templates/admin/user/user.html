<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
</head>
<body class="sb-nav-fixed">

<!-- Navbar & Sidebar -->
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar :: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <!-- 📌 Bảng danh sách -->
            <div class="container-fluid px-4 mt-3">
                <div class="table-title d-flex justify-content-between align-items-center mb-3">
                    <h2>Quản lí <b>nhân viên</b></h2>
                    <form th:action="@{/user/list}" method="get" class="d-flex" style="width: 300px;">
                        <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm nhân viên ..."
                               th:value="${keyword}">
                        <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </div>

                <table class="table table-striped table-hover align-middle">
                    <thead>
                    <tr>
                        <th>STT</th><th>Tên</th><th>Tài khoản</th><th>Email</th><th>Kích hoạt</th><th>Số điện thoại</th>
                        <th>Địa chỉ</th><th>Quyền</th><th>Ngày tạo</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user,stat : ${userPage.content}">
                        <td th:text="${stat.index + 1}"></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td><i th:if="${user.enabled}" class="fas fa-check text-success"></i></td>
                        <td th:text="${user.phoneNumber}"></td>
                        <td th:text="${user.address}"></td>
                        <td th:text="${user.role != null ? user.role.roleName : 'Không có'}"></td>
                        <td th:text="${#temporals.format(user.updateAt != null ? user.updateAt : user.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a href="#editUserModal" class="edit" th:data-id="${user.userId}" data-bs-toggle="modal">
                                <i class="material-icons" title="Edit">&#xE254;</i>
                            </a>
                            <a href="javascript:void(0)" class="delete" th:data-id="${user.userId}">
                                <i class="material-icons" title="Delete">&#xE872;</i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <!-- 📌 Phân trang -->
                <nav>
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${userPage.first} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{'/user/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, userPage.totalPages-1)}"
                            th:classappend="${i} == ${currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{'/user/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                               th:text="${i+1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${userPage.last} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{'/user/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- 📌 Modal Edit -->
            <div id="editUserModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="editForm">
                            <div class="modal-header">
                                <h5 class="modal-title">Chỉnh sửa nhân viên</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" id="editUserId">
                                <!-- Thông báo lỗi chung -->
                                <div id="editGeneralError" class="alert alert-danger d-none mb-3" role="alert"></div>
                                
                                <div class="form-group mb-2">
                                    <label>Tên</label>
                                    <input id="editFullName" class="form-control" required>
                                    <div class="text-danger small mt-1" id="editFullNameError"></div>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Tài khoản</label>
                                    <input id="editUserName" class="form-control" required>
                                    <div class="text-danger small mt-1" id="editUserNameError"></div>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Email</label>
                                    <input id="editEmail" class="form-control" required>
                                    <div class="text-danger small mt-1" id="editEmailError"></div>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Số điện thoại</label>
                                    <input id="editPhoneNumber" class="form-control" required>
                                    <div class="text-danger small mt-1" id="editPhoneNumberError"></div>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Địa chỉ</label>
                                    <input id="editAddress" class="form-control" required>
                                    <div class="text-danger small mt-1" id="editAddressError"></div>
                                </div>
                                <div class="form-group">
                                    <label>Quyền</label>
                                    <select id="editRoleId" class="form-control" required>
                                        <option th:each="role : ${allRoles}"
                                                th:value="${role.roleId}"
                                                th:text="${role.roleName}">
                                        </option>
                                    </select>
                                    <div class="text-danger small mt-1" id="editRoleIdError"></div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- 📌 JS -->
<script src="/admin/js/scripts.js"></script>

<script>
    $(function () {
        const csrfToken = $('meta[name="_csrf"]').attr('content');
        const csrfHeader = $('meta[name="_csrf_header"]').attr('content');

        /** 🧹 Xóa tất cả lỗi hiện tại */
        function clearErrors() {
            // Xóa lỗi chung
            $('#editGeneralError').addClass('d-none').text('');
            
            // Xóa lỗi của từng field
            $('#editFullNameError').text('');
            $('#editUserNameError').text('');
            $('#editEmailError').text('');
            $('#editPhoneNumberError').text('');
            $('#editAddressError').text('');
            $('#editRoleIdError').text('');
            
            // Xóa class is-invalid từ các input
            $('#editForm input, #editForm select').removeClass('is-invalid');
        }

        /** 📢 Hiển thị lỗi dưới các input field */
        function showErrors(response, defaultMsg = 'Đã xảy ra lỗi!') {
            clearErrors();
            
            if (!response) {
                $('#editGeneralError').removeClass('d-none').text(defaultMsg);
                return;
            }
            
            // Mapping tên field từ DTO sang ID trong form
            const fieldMapping = {
                'fullName': 'editFullName',
                'username': 'editUserName',
                'email': 'editEmail',
                'phoneNumber': 'editPhoneNumber',
                'address': 'editAddress',
                'roleId': 'editRoleId'
            };
            
            // Nếu là string hoặc có message (lỗi chung)
            let generalError = null;
            if (typeof response === 'string') {
                generalError = response;
            } else if (response.message) {
                generalError = response.message;
            }
            
            if (generalError) {
                $('#editGeneralError').removeClass('d-none').text(generalError);
                return;
            }
            
            // Nếu là object với nhiều field errors
            let hasFieldErrors = false;
            for (const key in response) {
                if (response.hasOwnProperty(key)) {
                    const fieldId = fieldMapping[key];
                    if (fieldId) {
                        // Hiển thị lỗi dưới input tương ứng
                        $(`#${fieldId}Error`).text(response[key]);
                        $(`#${fieldId}`).addClass('is-invalid');
                        hasFieldErrors = true;
                    } else {
                        // Nếu không có mapping, thêm vào lỗi chung
                        if (!generalError) {
                            generalError = response[key];
                        } else {
                            generalError += '\n' + response[key];
                        }
                    }
                }
            }
            
            // Nếu có lỗi chung nhưng không có lỗi field cụ thể
            if (generalError && !hasFieldErrors) {
                $('#editGeneralError').removeClass('d-none').text(generalError);
            } else if (!hasFieldErrors && !generalError) {
                // Nếu không có lỗi nào được xử lý
                $('#editGeneralError').removeClass('d-none').text(defaultMsg);
            }
        }

        /** ⚡ Hàm gọi Ajax tiện dụng */
        function callAjax({url, method = 'GET', data = null, success, errorCallback}) {
            $.ajax({
                url, method,
                headers: { [csrfHeader]: csrfToken },
                contentType: data ? 'application/json' : undefined,
                data: data ? JSON.stringify(data) : undefined,
                success,
                error: function(xhr) {
                    // Xử lý cả JSON và text response
                    let errorResponse;
                    try {
                        errorResponse = xhr.responseJSON || JSON.parse(xhr.responseText);
                    } catch (e) {
                        // Nếu không parse được JSON, thử lấy responseText
                        errorResponse = xhr.responseText || xhr.statusText || 'Đã xảy ra lỗi!';
                    }
                    if (errorCallback) {
                        errorCallback(errorResponse);
                    } else {
                        showErrors(errorResponse);
                    }
                }
            });
        }

        /** 📝 Click Edit */
        $(document).on('click', '.edit', function () {
            const id = $(this).data('id');
            clearErrors(); // Xóa lỗi khi mở modal
            callAjax({
                url: `/user/edit/${id}`,
                success: data => {
                    console.log(data);
                    $('#editUserId').val(data.userId);
                    $('#editFullName').val(data.fullName);
                    $('#editUserName').val(data.username);
                    $('#editEmail').val(data.email);
                    $('#editPhoneNumber').val(data.phoneNumber);
                    $('#editAddress').val(data.address);
                    $('#editRoleId').val(data.roleId);
                }
            });
        });

        /** 🗑️ Click Delete */
        $(document).on('click', '.delete', function () {
            const id = $(this).data('id');
            if (confirm('Bạn có chắc chắn muốn xóa nhân viên này?\nHành động này không thể hoàn tác.')) {
                callAjax({
                    url: `/user/delete/${id}`,
                    method: 'POST',
                    success: () => {
                        alert('Xóa thành công!');
                        location.reload();
                    }
                });
            }
        });

        /** 💾 Submit Edit Form */
        $('#editForm').on('submit', function (e) {
            e.preventDefault();
            clearErrors(); // Xóa lỗi cũ trước khi submit
            
            const data = {
                userId: $('#editUserId').val(),
                fullName: $('#editFullName').val(),
                username: $('#editUserName').val(),
                email: $('#editEmail').val(),
                phoneNumber: $('#editPhoneNumber').val(),
                address: $('#editAddress').val(),
                roleId: $('#editRoleId').val()
            };
            callAjax({
                url: `/user/update/${data.userId}`,
                method: 'POST',
                data,
                success: () => {
                    $('#editUserModal').modal('hide');
                    alert('Cập nhật thành công!');
                    location.reload();
                },
                errorCallback: function(errorResponse) {
                    showErrors(errorResponse);
                }
            });
        });
    });
</script>
</body>
</html>

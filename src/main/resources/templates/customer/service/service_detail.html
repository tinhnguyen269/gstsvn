<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head('Dịch vụ', ~{::styles})">
    <styles>
        <link href="/customer/css/service-detail.css" rel="stylesheet" />
    </styles>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="customer/common/header::header"></div>

<!-- Content + Sidebar -->
<div class="container mt-5 pt-4">
    <div class="row">
        <!-- Content chính -->
        <main class="col-12 col-md-8 order-2 order-md-1 service-main">
            <nav aria-label="breadcrumb" class="pt-4 mt-1">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-dark">Trang chủ</a></li>
                    <li class="breadcrumb-item active text-dark" aria-current="page">Dịch vụ</li>
                </ol>
            </nav>

            <div class="article-content" th:utext="${services.content}">
            </div>
        </main>

        <!-- Sidebar -->
        <aside class="col-12 col-md-4 order-1 order-md-2" th:replace="customer/common/sidebar :: sidebar"></aside>
    </div>

    <!-- Button contact -->
    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>
</div>

<div th:replace="customer/common/footer :: footer"></div>

<!-- JAVASCRIPT FILES -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(${post.title}, ~{::styles})">
    <styles>
        <link href="/customer/css/post-detail.css" rel="stylesheet">
    </styles>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="customer/common/header:: header"></div>

<div class="container mt-5 pt-4">
    <div class="row ">
        <div class="col-12 col-md-8 mb-5 mb-md-0 order-1 order-md-1">
            <nav aria-label="breadcrumb" class="pt-4 mt-1">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item"><a th:href="@{/tin-tuc}" class="text-decoration-none text-dark"> Tin
                        tức</a></li>
                    <li class="breadcrumb-item active text-dark" aria-current="page">Chi tiết</li>
                </ol>
            </nav>
            <div class="text-muted mb-3">
                <i class="fa-regular fa-clock me-1"></i>
                <span th:text="${post.updateAt != null ? #temporals.format(post.updateAt, 'dd/MM/yyyy HH:mm') : #temporals.format(post.createAt, 'dd/MM/yyyy HH:mm')}"></span>
            </div>

            <div class="article-content" th:utext="${post.content}"></div>
            <div class="mt-5" th:replace="customer/common/post :: post"></div>
        </div>

        <aside class="col-12 col-md-4 order-2 order-md-2">
            <div class="mb-4" th:replace="customer/common/sidebar :: sidebarService"></div>
            <div th:replace="customer/common/sidebar :: sidebarPost"></div>
        </aside>
    </div>

    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>
</div>

<!-- Nút liên hệ -->
<div class="mt-5" th:replace="customer/common/contact :: contact"></div>
<!--Button scroll head-->
<div th:replace="customer/common/scroll_head:: scroll-head"></div>
</div>

<div th:replace="customer/common/footer :: footer"></div>
<!-- JAVASCRIPT FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/customer/js/common.js"></script>

</body>
</html>

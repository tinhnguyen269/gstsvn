<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Register - SB Admin</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dyeje8mx3/image/upload/v1755924095/gsts-logo_ll5vaz.png">

    <link href="admin/css/styles.css" rel="stylesheet"/>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-7">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-center font-weight-light my-4">Đăng kí</h3>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/register}" method="post" th:object="${user}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                    <!-- Username -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputUserName" type="text"
                                               th:field="*{username}" placeholder="Username" required/>
                                        <label for="inputUserName">Tên đăng nhập</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('username')}"
                                             th:errors="*{username}"></div>
                                    </div>

                                    <!-- Email -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputEmail" type="email"
                                               th:field="*{email}" placeholder="name@example.com" required/>
                                        <label for="inputEmail">Email</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('email')}"
                                             th:errors="*{email}"></div>
                                    </div>

                                    <!-- Password -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputPassword" type="password"
                                               th:field="*{password}" placeholder="Create a password" required/>
                                        <label for="inputPassword">Mật khẩu</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('password')}"
                                             th:errors="*{password}"></div>
                                    </div>

                                    <!-- Password -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputPasswordConfirmation" type="password"
                                               th:field="*{passwordConfirmation}" placeholder="Password confirm" required/>
                                        <label for="inputPasswordConfirmation">Mật khẩu xác nhận</label>
                                        <div class="text-danger" th:text="${passwordError}"></div>

                                    </div>

                                    <!-- Full Name (Employee) -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputFullName" type="text"
                                               th:field="*{fullName}" placeholder="Họ tên" required/>
                                        <label for="inputFullName">Họ tên</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('fullName')}"
                                             th:errors="*{fullName}"></div>
                                    </div>

                                    <!-- Phone (Employee) -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputPhone" type="text"
                                               th:field="*{phoneNumber}" placeholder="Số điện thoại" required/>
                                        <label for="inputPhone">Số điện thoại</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}"
                                             th:errors="*{phoneNumber}"></div>
                                    </div>

                                    <!-- Address (Employee) -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputAddress" type="text"
                                               th:field="*{address}" placeholder="Địa chỉ" required/>
                                        <label for="inputAddress">Địa chỉ</label>
                                        <div class="text-danger" th:if="${#fields.hasErrors('address')}"
                                             th:errors="*{address}"></div>
                                    </div>

                                    <div class="mt-4 mb-0">
                                        <button class="btn btn-primary" type="submit">Đăng kí</button>
                                    </div>
                                </form>

                            </div>
                            <div class="card-footer text-center py-3">
                                <div class="small"><a th:href="@{/login}">Bạn đã có tài khoản? Đăng nhập</a></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>
</body>
</html>

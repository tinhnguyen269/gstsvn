<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard - SB Admin</title>
    <head th:replace="admin/common/header :: header"></head>

</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar:: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row">
                            <div class="col-sm-6">
                                <h2>Quản lí <b>khách hàng</b></h2>
                            </div>
                            <div class="col-sm-12 d-flex justify-content-end">
                                <div class="input-group me-2" style="width: 250px;">
                                    <form th:action="@{/admin/contact/list}" method="get" class="d-flex me-2"
                                          style="width: 300px;">
                                        <input class="form-control me-2" type="text" name="keyword"
                                               placeholder="Tìm khách hàng..."
                                               th:value="${keyword}" aria-label="Search">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                                <a href="#addContactModal" class="btn btn-success" data-toggle="modal"><i
                                        class="material-icons">&#xE147;</i> <span>Thêm mới</span></a>
                            </div>
                        </div>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Số điện thoại</th>
                            <th>Dịch vụ</th>
                            <th>Ghi chú</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="customer : ${customerPage.content}">
                            <td th:text="${customer.customerId}"></td>
                            <td th:text="${customer.name}"></td>
                            <td th:text="${customer.phoneNumber}"></td>
                            <td th:text="${customer.serviceId}"></td>
                            <td th:text="${customer.context}"></td>
                            <td th:text="${customer.status}"></td>
                            <td th:text="${customer.createAt}"></td>
                            <td>
                                <a href="#editContactModal"
                                   class="edit"
                                   th:data-id="${customer.customerId}"
                                   data-toggle="modal">
                                    <i class="material-icons" data-toggle="tooltip" title="Edit">&#xE254;</i>
                                </a>

                                <a href="#deleteContactModal" class="delete" data-toggle="modal"
                                   th:data-id="${customer.customerId}"
                                ><i
                                        class="material-icons" data-toggle="tooltip" title="Delete">&#xE872;</i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center">
                            <!-- Previous -->
                            <li class="page-item" th:classappend="${customerPage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/contact/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, customerPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/contact/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}">1</a>
                            </li>

                            <!-- Next -->
                            <li class="page-item" th:classappend="${customerPage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/contact/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>
            <!-- Edit Modal HTML -->
            <div id="addContactModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form method="post" th:action="@{/admin/contact/add}" th:object="${customerNew}">
                            <div class="modal-header">
                                <h4 class="modal-title">Thêm khách hàng</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                                </button>
                            </div>
                            <div class="modal-body">
                                <div class="form-group">
                                    <label>Tên</label>
                                    <input th:field="*{name}" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input th:field="*{phoneNumber}" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Dịch vụ</label>
                                    <select th:field="*{serviceId}" class="form-control" required>
                                        <option value="">-- Chọn dịch vụ --</option>
                                        <option th:each="service : ${serviceAdvice}"
                                                th:value="${service.serviceId}"
                                                th:text="${service.serviceName}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>Ghi chú</label>
                                    <textarea th:field="*{context}" class="form-control" required></textarea>
                                </div>

                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
                                <input type="submit" class="btn btn-success" value="Add"
                                       th:action="@{/admin/contact/add}">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Edit Modal HTML -->
            <div id="editContactModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="editForm">
                            <div class="modal-header">
                                <h4 class="modal-title">Chỉnh sửa khách hàng</h4>
                                <button type="button" class="close" data-dismiss="modal">&times;</button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" name="editCustomerId" id="editCustomerId">
                                <div class="form-group">
                                    <label>Tên</label>
                                    <input name="editName" id="editName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input name="editPhoneNumber" id="editPhoneNumber" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Dịch vụ</label>
                                    <select name="editServiceId" id="editServiceId" class="form-control" required>
                                        <option th:each="service : ${serviceAdvice}"
                                                th:value="${service.serviceId}"
                                                th:text="${service.serviceName}"></option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Ghi chú</label>
                                    <textarea name="editContext" id="editContext" class="form-control"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Trạng thái</label>
                                    <select name="editStatus" id="editStatus" class="form-control">
                                        <option value="Chờ liên hệ">Chờ liên hệ</option>
                                        <option value="Đã liên hệ">Đã liên hệ</option>
                                        <option value="Hủy bỏ">Hủy bỏ</option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div id="deleteContactModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="deleteForm">
                            <input type="hidden" id="deleteCustomerId" name="deleteCustomerId">
                            <div class="modal-header">
                                <h4 class="modal-title">Xóa khách hàng</h4>
                                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                                </button>
                            </div>
                            <div class="modal-body">
                                <p>Are you sure you want to delete these Records?</p>
                                <p class="text-warning"><small>This action cannot be undone.</small></p>
                            </div>
                            <div class="modal-footer">
                                <input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
                                <input type="submit" class="btn btn-danger" value="Delete">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script>
    $(document).ready(function () {
        // Khi bấm vào nút sửa
        $('.edit').on('click', function () {
            var customerId = $(this).data('id');
            $.ajax({
                url: '/admin/contact/edit/' + customerId,
                type: 'GET',
                success: function (data) {
                    // Fill data vào form
                    $('#editCustomerId').val(data.customerId);
                    $('#editName').val(data.name);
                    $('#editPhoneNumber').val(data.phoneNumber);
                    $('#editServiceId').val(data.serviceId);
                    $('#editContext').val(data.context);
                    $('#editStatus').val(data.status);
                },
                error: function () {
                    alert('Không thể lấy dữ liệu khách hàng.');
                }
            });
        });

        $('.delete').on('click', function () {
            var customerId = $(this).data('id');
            $('#deleteCustomerId').val(customerId);
        });


        $('#deleteForm').on('submit', function (e) {
            e.preventDefault(); // tránh submit form thật
            var customerId = $('#deleteCustomerId').val();
            $.ajax({
                url: '/admin/contact/delete/' + customerId,
                type: 'POST',
                success: function () {
                    $('#deleteContactModal').modal('hide');
                    location.reload();
                },
                error: function () {
                    alert('Không thể xóa dữ liệu khách hàng.');
                }
            });
        });

        // Submit form
        $('#editForm').on('submit', function (e) {
            e.preventDefault();

            var customerData = {
                customerId: $('#editCustomerId').val(),
                name: $('#editName').val(),
                phoneNumber: $('#editPhoneNumber').val(),
                serviceId: $('#editServiceId').val(),
                context: $('#editContext').val(),
                status: $('#editStatus').val()
            };

            $.ajax({
                url: '/admin/contact/update/' + customerData.customerId,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(customerData),
                success: function () {
                    $('#editContactModal').modal('hide');
                    location.reload(); // hoặc load lại dữ liệu bằng AJAX
                },
                error: function () {
                    alert('Cập nhật thất bại.');
                }
            });
        });
    });
</script>
</body>
</html>

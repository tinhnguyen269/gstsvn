<div th:fragment="post">
  <hr class="border border-2 border-success opacity-50 w-50 mx-auto my-0" >

  <!-- Tin tức/Bài viết -->
  <section class="container my-5">
    <h4 class="text-center text-success fw-bold mb-5">BÀI VIẾT LIÊN QUAN</h4>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
      <div th:each="post : ${Post}" class="col">
        <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden news-card">
          <div class="ratio ratio-16x9">
            <img th:src="${post.imageUrl}" th:alt="${post.title}"
                 alt="Tin tức"
                 class="img-fluid object-fit-cover">
          </div>

          <div class="card-body d-flex flex-column p-3">
            <h6 th:text="${post.title}" class="fw-semibold mb-1 text-truncate fs-6"></h6>
            <p th:text="${dateFormatter.format(post.createAt)}"
               class="text-muted small mb-2"></p>
            <a th:href="@{/tin-tuc/{slug}(slug=${post.slug})}"
               class="btn btn-success btn-sm rounded-pill mt-auto align-self-start px-3 py-1">
              Xem chi tiết
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

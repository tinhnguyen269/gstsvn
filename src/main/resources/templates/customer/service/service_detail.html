<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="customer/common/head :: head(${services.serviceName}, ~{::styles})">
    <styles>
        <link href="/customer/css/service-detail.css" rel="stylesheet" />
    </styles>
</head>
<body>
<!-- Nội dung trang -->
</body>
</html>

<body class="d-flex flex-column min-vh-100">

<div th:replace="customer/common/navbar::header"></div>

<!-- Content + Sidebar -->
<div class="container mt-5 pt-4">
    <div class="row">
        <!-- Content chính -->
        <main class="col-12 col-md-8 order-1 order-md-1 service-main">
            <nav aria-label="breadcrumb" class="pt-4 mt-1">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-dark">Trang chủ</a></li>
                    <li class="breadcrumb-item active text-dark" aria-current="page">Dịch vụ</li>
                </ol>
            </nav>

            <div class="article-content" th:utext="${services.content}"></div>
            <div class="mt-5" th:replace="customer/common/post :: post"></div>
        </main>

        <aside class="col-12 col-md-4 order-2 order-md-2">
            <div class="mb-4" th:replace="customer/common/sidebar :: sidebarService"></div>
            <div th:replace="customer/common/sidebar :: sidebarPost"></div>
        </aside>
    </div>

    <!-- Button contact -->
    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>

    <!--Button scroll head-->
    <div th:replace="customer/common/scroll_head:: scroll-head"></div>
</div>

<div th:replace="customer/common/footer :: footer"></div>

<!-- JAVASCRIPT FILES -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/customer/js/common.js"></script>

<script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Công ty Vệ Sinh GSTS",
        "@id": "https://gstsvn.onrender.com/dich-vu/[[${services.slug}]]",
        "url": "https://gstsvn.onrender.com/dich-vu/[[${services.slug}]]",
        "telephone": "0333360748",
        "priceRange": "₫",
        "address": {
            "@type": "PostalAddress",
            "streetAddress": "Thôn An Đông, Xã Thái Hòa, Huyện Bình Giang",
            "addressLocality": "Tỉnh Hải Dương",
            "addressCountry": "Việt Nam"
        },
        "serviceType": "[[${services.serviceName}]]",
        "areaServed": "Hà Nội và khu vực lân cận"
    }
</script>


</body>

</html>

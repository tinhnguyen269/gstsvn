<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
    <!-- CKEditor -->
    <script src="https://cdn.ckeditor.com/ckeditor5/41.3.1/classic/ckeditor.js"></script>
</head>
<body >
<div id="layoutSidenav">

    <!-- Main Content -->
    <div id="layoutSidenav_content">
        <main class="container py-4">
            <div class="card shadow-sm rounded-4">
                <div class="card-header bg-success text-white rounded-top-4">
                    <h3 class="mb-0">📝 Thêm dịch vụ mới</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/service/save}" th:object="${service}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="title" class="form-label">Tiêu đề</label>
                            <input type="text" 
                                   th:field="*{serviceName}" 
                                   class="form-control form-control-lg rounded-3"
                                   th:classappend="${#fields.hasErrors('serviceName')} ? 'is-invalid' : ''"
                                   id="title" 
                                   placeholder="Nhập tên dịch vụ" 
                                   required/>
                            <!-- Hiển thị lỗi validation từ Thymeleaf -->
                            <div class="text-danger small mt-1" 
                                 th:if="${#fields.hasErrors('serviceName')}"
                                 th:errors="*{serviceName}">Tên dịch vụ đã tồn tại. Vui lòng chọn tên khác!</div>
                        </div>
                        <!-- Icon -->
                        <div class="mb-3">
                            <label for="iconUpload" class="form-label">Icon dịch vụ</label>
                            <input class="form-control" type="file" id="iconUpload" accept="image/*"
                                   onchange="uploadImage(event)"
                                   data-preview="iconPreview" data-url="iconUrl">

                            <div class="mt-3">
                                <img id="iconPreview"
                                     src=""
                                     alt="Icon preview"
                                     class="img-fluid rounded shadow-sm"
                                     style="max-width: 150px; height: auto; border: 1px solid #ddd; display: none;">
                            </div>
                            <!-- Giữ id cố định -->
                            <input type="hidden" id="iconUrl" th:field="*{icon}">
                        </div>

                        <!-- Bảng giá -->
                        <div class="mb-3">
                            <label for="priceUpload" class="form-label">Image bảng giá</label>
                            <input class="form-control" type="file" id="priceUpload" accept="image/*"
                                   onchange="uploadImage(event)"
                                   data-preview="pricePreview" data-url="priceUrl">

                            <div class="mt-3">
                                <img id="pricePreview"
                                     src=""
                                     alt="Bảng giá preview"
                                     class="img-fluid rounded shadow-sm"
                                     style="max-width: 250px; display: none;">
                            </div>
                            <!-- Giữ id cố định -->
                            <input type="hidden" id="priceUrl" th:field="*{imgPrice}">
                        </div>

                        <div class="mb-3">
                            <label for="contentEditor" class="form-label">Nội dung</label>
                            <textarea id="contentEditor" th:field="*{content}" class="form-control" rows="8"></textarea>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-success btn-sm rounded-pill px-4">💾 Lưu</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-4"
                                    onclick="confirmBack()">⬅️ Quay lại
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- CKEditor Config -->
<script>
    // Lấy CSRF token và header name từ meta
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    ClassicEditor
        .create(document.querySelector('#contentEditor'), {
            toolbar: [
                'heading', '|',
                'bold', 'italic', 'underline', 'link', '|',
                'bulletedList', 'numberedList', '|',
                'blockQuote', 'insertTable', 'imageUpload', 'mediaEmbed', '|',
                'undo', 'redo'
            ]
        })
        .then(editor => {
            editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
                return new MyUploadAdapter(loader);
            };
        })
        .catch(error => {
            console.error(error);
        });

    class MyUploadAdapter {
        constructor(loader) {
            this.loader = loader;
        }

        upload() {
            return this.loader.file
                .then(file => new Promise((resolve, reject) => {
                    const formData = new FormData();
                    formData.append('upload', file);

                    fetch('/admin/uploadImage', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            [csrfHeader]: csrfToken // Gửi CSRF token
                        }
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.uploaded === 1) {
                                resolve({
                                    default: data.url
                                });
                            } else {
                                reject(data.error?.message || 'Upload thất bại');
                            }
                        })
                        .catch(err => {
                            reject('Lỗi upload: ' + err);
                        });
                }));
        }
    }

    function uploadImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const previewId = event.target.dataset.preview;
        const urlInputId = event.target.dataset.url;

        const formData = new FormData();
        formData.append("upload", file);

        fetch("/admin/uploadImage", {
            method: "POST",
            body: formData,
            headers: {
                [csrfHeader]: csrfToken // Gửi CSRF token
            }
        })
            .then(res => res.json())
            .then(data => {
                if (data.uploaded === 1) {
                    const previewEl = document.getElementById(previewId);
                    const inputEl = document.getElementById(urlInputId);

                    if (previewEl) {
                        previewEl.src = data.url;
                        previewEl.style.display = "block";
                    }
                    if (inputEl) {
                        inputEl.value = data.url;
                    }
                } else {
                    alert("Upload thất bại: " + (data.error?.message || "Không rõ nguyên nhân"));
                }
            })
            .catch(err => {
                console.error(err);
                alert("Có lỗi khi upload ảnh.");
            });
    }


    function confirmBack() {
        if (confirm("Bạn có chắc muốn quay lại mà không lưu bài viết?")) {
            window.location.href = "/admin/service/list";
        }
    }
</script>

<!-- Optional Custom JS -->
<script src="/admin/js/scripts.js"></script>

</body>
</html>

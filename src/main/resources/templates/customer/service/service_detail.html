<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(
    ${services.serviceName},
    ~{::styles},
    ~{::meta}
)">
    <th:block th:fragment="meta">
    <!-- ✅ SEO META -->
    <meta name="description" th:content="${services.serviceName}">
    <meta name="keywords" th:content="${services.serviceName}">
    <meta property="og:title" th:content="${services.serviceName}">
    <meta property="og:description" th:content="${services.serviceName}">
    <meta property="og:image" th:content="${services.icon}">
    <meta property="og:url" th:content="@{'/dich-vu/' + ${services.slug}}">
    <meta property="og:type" content="article">
        <!-- ✅ SCHEMA.ORG JSON-LD -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "LocalBusiness",
                "name": "Công ty Vệ Sinh GSTS",
                "image": "https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png",
                "@id": "https://gsts.click/dich-vu/${services.slug}",
                "url": "https://gsts.click/dich-vu/${services.slug}",
                "telephone": " 0965123855",
                "priceRange": "₫",
                "address": {
                    "@type": "PostalAddress",
                    "streetAddress": "Thôn An Đông, Xã Thái Hòa, Huyện Bình Giang",
                    "addressLocality": "Tỉnh Hải Dương",
                    "addressCountry": "Việt Nam"
                },
                "serviceType": "${services.serviceName}",
                "areaServed": "Hà Nội và khu vực lân cận"
            }
        </script>
    </th:block>
    <th:block th:fragment="styles">
        <link href="/customer/css/post-detail.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    </th:block>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- ✅ HEADER -->
<header th:replace="customer/common/navbar::header"></header>

<!-- ✅ MAIN CONTENT -->
<main class="container mt-5 pt-4">
    <div class="row">
        <h1 class="visually-hidden">Dịch vụ GSTS - [[${services.serviceName}]]</h1>
        <div class="col-12 col-md-9 mb-5" data-aos="fade-up">
            <nav aria-label="breadcrumb" class="pt-4 mt-1">
                <ol class="breadcrumb bg-transparent p-0 mb-3">
                    <li class="breadcrumb-item">
                        <a th:href="@{/}" class="text-decoration-none">Trang chủ</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/}" class="text-decoration-none">Dịch vụ</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${services.serviceName}"></li>
                </ol>
            </nav>
            <div class="text-muted mb-3">
                <i class="fa-regular fa-clock me-1"></i>
                <span th:text="${services.updateAt != null ? dateFormatter.format(services.updateAt) : dateFormatter.format(services.createAt)}"></span>
            </div>
            <article class="article-content" th:utext="${services.content}"></article>
        </div>
        <aside class="col-12 col-md-3 order-2 order-md-2">
            <div th:replace="customer/common/sidebar :: sidebarPost"></div>
            <div class="mb-4" th:replace="customer/common/sidebar :: sidebarService"></div>
        </aside>
    </div>
    <section class="mt-5" th:replace="customer/common/post :: post"></section>
    <section class="mt-5" th:replace="customer/common/quote-form :: quoteForm"></section>

    <section class="mt-5" th:replace="customer/common/contact :: contact"></section>
</main>

<!-- Button scroll head -->
<div th:replace="customer/common/scroll_head:: scroll-head"></div>

<!-- Footer -->
<!-- Live Chat Widget -->
<div th:replace="customer/common/livechat :: livechat"></div>

<footer th:replace="customer/common/footer :: footer"></footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>
<script src="/customer/js/common.js"></script>

</body>
</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="">
    <meta name="author" content="Tooplate">

    <title>Moso Interior - Product Detail Page</title>

    <!-- CSS FILES -->
    <link href="/customer/css/home.css" rel="stylesheet">
    <link href="/customer/css/common.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="shop-detail-page">

<di th:replace="customer/common/header::header"></di>
<main class="col-12 order-2 order-md-1 mb-4">
    <section class="container my-5">
        <nav aria-label="breadcrumb" class="pt-5 mt-5">
            <ol class="breadcrumb bg-transparent p-0 mb-3">
                <li class="breadcrumb-item"><a th:href="@{/home}" class="text-decoration-none text-dark">Trang chủ</a></li>
                <li class="breadcrumb-item active text-dark" aria-current="page">Tin tức</li>
            </ol>
        </nav>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            <div th:each="post : ${Post}" class="col">
                <div class="news-card h-100 border rounded shadow-sm overflow-hidden">
                    <img th:src="${post.imageUrl}" th:alt="${post.title}"
                         alt="Tin tức"
                         class="img-fluid w-100"
                         style="height:180px;object-fit:cover;">

                    <div class="p-3">
                        <h6 th:text="${post.title}" class="fw-bold mb-2"></h6>
                        <p th:text="${#temporals.format(post.createAt, 'dd/MM/yyyy HH:mm')}" class="text-muted small mb-2"></p>
                        <a th:href="@{/home/post/list/{id}(id=${post.postId})}" class="btn btn-outline-success btn-sm rounded-pill">Xem chi tiết</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="customer/common/footer::footer"></div>

<!-- JAVASCRIPT FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/customer/js/custom.js"></script>
<script src="/customer/js/home.js"></script>

</body>
</html>

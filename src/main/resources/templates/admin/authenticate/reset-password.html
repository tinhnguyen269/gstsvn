<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <link href="/admin/css/styles.css" rel="stylesheet"/>
</head>
<body class="bg-primary">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-6 col-sm-8 col-10"> <!-- Responsive columns -->
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header"><h3 class="text-center">Đặt lại mật khẩu</h3></div>
                <div class="card-body">
                    <!-- Đưa token vào dưới dạng hidden input -->
                    <form th:action="@{/reset-password}" method="post" th:object="${user}">
                        <input type="hidden" name="token" th:value="${token}" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-floating mb-3">
                            <input class="form-control" type="password" th:field="*{password}"
                                   placeholder="Mật khẩu mới" required/>
                            <label>Mật khẩu mới</label>
                            <div class="text-danger" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>
                        <div class="form-floating mb-3">
                            <input class="form-control" type="password" th:field="*{passwordConfirmation}"
                                   placeholder="Mật khẩu xác nhận" required/>
                            <label>Mật khẩu xác nhận</label>
                            <div class="text-danger" th:if="${#fields.hasErrors('passwordConfirmation')}"
                                 th:errors="*{passwordConfirmation}"></div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button class="btn btn-primary" type="submit">Xác nhận</button>
                        </div>
                    </form>
                </div>
                <p th:text="${message}" style="color: red"></p>

                <div class="card-footer text-center py-3">
                    <div class="small"><a th:href="@{/login}">Quay lại đăng nhập</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(
   'Bảng giá dịch vụ vệ sinh GSTS - Giá chi tiết các gói dịch vụ',
    ~{::styles},
    ~{::meta}
)">
    <th:block th:fragment="meta">
        <meta name="description"
              content="Tham khảo bảng giá dịch vụ vệ sinh công nghiệp GSTS chi tiết: vệ sinh nhà ở, văn phòng, nhà xưởng, giặt thảm, lau kính. Giá cả minh bạch - Uy tín - Chuyên nghiệp.">
        <meta name="keywords"
              content="bảng giá vệ sinh công nghiệp, giá dịch vụ vệ sinh, vệ sinh văn phòng, vệ sinh nhà xưởng, vệ sinh nhà ở, GSTS">
        <meta name="robots" content="index, follow">

        <!-- ✅ Canonical URL (quan trọng để tránh trùng lặp nội dung) -->
        <link rel="canonical" th:href="${canonicalUrl}"/>

        <!-- ✅ Open Graph (Facebook, Zalo, LinkedIn) -->
        <meta property="og:title" content="Bảng giá dịch vụ vệ sinh GSTS - Giá chi tiết các gói dịch vụ">
        <meta property="og:description"
              content="Bảng giá dịch vụ vệ sinh công nghiệp GSTS chi tiết, minh bạch và cạnh tranh. Liên hệ ngay để được báo giá miễn phí.">
        <meta property="og:type" content="website">
        <meta property="og:url" th:content="${canonicalUrl}">
        <meta property="og:image"
              content="https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png">
        <meta property="og:locale" content="vi_VN">
        <meta property="og:site_name" content="GSTS">

        <!-- ✅ Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Bảng giá dịch vụ vệ sinh GSTS - Giá chi tiết các gói dịch vụ">
        <meta name="twitter:description"
              content="Cập nhật bảng giá dịch vụ vệ sinh công nghiệp GSTS: giá rõ ràng, dịch vụ chất lượng, bảo đảm hài lòng.">
        <meta name="twitter:image"
              content="https://res.cloudinary.com/dyeje8mx3/image/upload/v1760675146/GSTS-removebg-preview_a5ydty.png">
    </th:block>
    <th:block th:fragment="styles">
        <link href="/customer/css/price-list.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    </th:block>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="customer/common/navbar::header"></div>
<!-- MAIN CONTENT -->
<main class="container mt-5 pt-5 flex-grow-1">
    <h1 class="visually-hidden">Bảng giá dịch vụ vệ sinh GSTS - Cập nhật mới nhất</h1>
    <nav aria-label="breadcrumb" itemscope itemtype="https://schema.org/BreadcrumbList" class="pt-3">
        <ol class="breadcrumb bg-transparent p-0 mb-3">
            <li class="breadcrumb-item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <a th:href="@{/}" itemprop="item" class="text-decoration-none text-dark">
                    <span itemprop="name">Trang chủ</span>
                </a>
                <meta itemprop="position" content="1"/>
            </li>
            <li class="breadcrumb-item active text-dark" aria-current="page"
                itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <span itemprop="name">Bảng giá</span>
                <meta itemprop="position" content="2"/>
            </li>
        </ol>
    </nav>
    <section aria-label="Danh mục bảng giá dịch vụ" data-aos="fade-up">
        <ul class="nav nav-tabs justify-content-center">
            <li th:each="service, iterStat : ${serviceAdvice}" class="nav-item">
                <button type="button"
                        class="nav-link"
                        th:text="${service.serviceName}"
                        th:attr="data-img=${service.imgPrice}, id=${iterStat.index == 0 ? 'first-tab' : null}"
                        onclick="changeImage(event, this)">
                </button>
            </li>
        </ul>
    </section>
    <section class="price-table text-center my-4" aria-label="Bảng giá chi tiết" data-aos="fade-up" data-aos-delay="200">
        <img id="priceImage"
             src=""
             alt="Bảng giá chi tiết dịch vụ vệ sinh GSTS"
             class="img-fluid rounded shadow transition-opacity"
             style="transition: opacity 0.3s ease;" />
    </section>
    <!-- Button contact & scroll -->
    <div th:replace="customer/common/contact :: contact"></div>
    <div th:replace="customer/common/scroll_head :: scroll-head"></div>
</main>

<!-- FOOTER -->
<footer th:replace="customer/common/footer::footer" class="mt-auto"></footer>

<!-- JAVASCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/customer/js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });

    function changeImage(event, element) {
        const imageUrl = element.getAttribute('data-img');
        const priceImg = document.getElementById('priceImage');

        priceImg.style.opacity = '0';
        setTimeout(() => {
            priceImg.src = imageUrl;
            priceImg.style.opacity = '1';
        }, 300);

        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => link.classList.remove('active'));
        element.classList.add('active');
    }

    window.onload = function () {
        const priceImg = document.getElementById('priceImage');
        const firstTab = document.getElementById('first-tab');
        if (firstTab) {
            priceImg.src = firstTab.getAttribute('data-img');
            firstTab.classList.add('active');
        }
    }
</script>
</body>
</html>

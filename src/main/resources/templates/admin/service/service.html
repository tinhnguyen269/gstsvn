<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
</head>
<body class="sb-nav-fixed">
<!-- Navbar -->
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar :: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive table-wrapper">
                <div class="table-title d-flex justify-content-between align-items-center flex-wrap">
                    <h2>Quản lí <b>dịch vụ</b></h2>
                    <div class="d-flex align-items-center">
                        <form th:action="@{/admin/service/list}" method="get" class="d-flex me-2" style="width: 300px;">
                            <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm dịch vụ..." th:value="${keyword}">
                            <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
                        </form>
                        <a th:href="@{/admin/service/add}" class="btn btn-success me-2">
                            <i class="material-icons">&#xE147;</i> <span>Thêm mới</span>
                        </a>
                        <button type="submit" form="deleteSelectedForm" class="btn btn-danger">
                            <i class="material-icons">delete</i> <span>Xoá</span>
                        </button>
                    </div>
                </div>

                <!-- Form xóa nhiều -->
                <form th:action="@{/admin/service/delSelected}" method="post" id="deleteSelectedForm">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th><input type="checkbox" id="checkAll"></th>
                            <th>ID</th>
                            <th>Tên dịch vụ</th>
                            <th>Ngày tạo</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="service : ${servicePage.content}">
                            <td><input type="checkbox" name="ids" th:value="${service.serviceId}"></td>
                            <td th:text="${service.serviceId}"></td>
                            <td th:text="${service.serviceName}"></td>
                            <td th:text="${#temporals.format(service.updateAt != null ? service.updateAt : service.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{'/admin/service/edit/' + ${service.serviceId}}" class="edit" title="Sửa">
                                    <i class="material-icons">&#xE254;</i>
                                </a>
                                <a href="javascript:void(0)" class="delete"
                                   th:onclick="'openDeleteModal(' + ${service.serviceId} + ')'">
                                    <i class="material-icons" title="Xoá">&#xE872;</i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </form>

                <!-- Pagination -->
                <nav>
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${servicePage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{'/admin/service/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, servicePage.totalPages-1)}"
                            th:classappend="${i} == ${currentPage} ? 'active'">
                            <a class="page-link" th:href="@{'/admin/service/list'(page=${i}, size=${pageSize}, keyword=${keyword})}" th:text="${i+1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${servicePage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{'/admin/service/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>
</div>

<!-- Script -->
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const STORAGE_KEY = 'selectedServiceIds';
    let selectedIds = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);

    // Xóa 1 bản ghi với alert
    function openDeleteModal(serviceId) {
        if (confirm("Bạn có chắc chắn muốn xóa dịch vụ này không?\nHành động này không thể phục hồi.")) {
            fetch(`/admin/service/delete/${serviceId}`, {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken }
            }).then(res => {
                if (res.ok) {
                    selectedIds.delete(serviceId);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
                    location.reload();
                } else alert("Xóa thất bại!");
            }).catch(() => alert("Có lỗi xảy ra!"));
        }
    }

    // Check all và lưu localStorage
    document.addEventListener('DOMContentLoaded', () => {
        const checkboxes = document.querySelectorAll('input[name="ids"]');
        const checkAll = document.getElementById('checkAll');

        checkboxes.forEach(cb => {
            const id = parseInt(cb.value);
            if (selectedIds.has(id)) cb.checked = true;

            cb.addEventListener('change', () => {
                cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
            });
        });

        checkAll.addEventListener('click', e => {
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                const id = parseInt(cb.value);
                e.target.checked ? selectedIds.add(id) : selectedIds.delete(id);
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
        });
    });

    // Xác nhận xóa nhiều
    document.getElementById('deleteSelectedForm').addEventListener('submit', function (e) {
        if (selectedIds.size === 0) {
            alert("Vui lòng chọn ít nhất 1 dịch vụ để xóa.");
            e.preventDefault();
            return;
        }
        if (!confirm("Bạn có chắc chắn muốn xóa các dịch vụ đã chọn?\nHành động này không thể phục hồi.")) {
            e.preventDefault();
            return;
        }

        selectedIds.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            this.appendChild(input);
        });
        localStorage.removeItem(STORAGE_KEY);
    });
</script>
<script src="/admin/js/scripts.js"></script>
</body>
</html>

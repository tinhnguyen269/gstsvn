<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar :: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4 mt-3">
                <!-- Tiêu đề + Tìm kiếm + Thêm + Xóa -->
                <div class="table-title d-flex justify-content-between align-items-center flex-wrap">
                    <h2>Quản lí <b>khách hàng</b></h2>
                    <div class="d-flex align-items-center">
                        <form th:action="@{/admin/contact/list}" method="get" class="d-flex me-2" style="width: 300px;">
                            <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm khách hàng..." th:value="${keyword}">
                            <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
                        </form>
                        <a href="#addContactModal" class="btn btn-success me-2" data-bs-toggle="modal">
                            <i class="material-icons">&#xE147;</i> <span>Thêm mới</span>
                        </a>
                        <button type="submit" form="deleteSelectedForm" class="btn btn-danger" th:if="${isAdmin}">
                            <i class="material-icons">delete</i> <span>Xoá</span>
                        </button>
                    </div>
                </div>

                <!-- Bảng khách hàng -->
                <form th:action="@{/admin/contact/delSelected}" method="post" id="deleteSelectedForm">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th th:if="${isAdmin}"><input type="checkbox" id="checkAll"></th>
                            <th>STT</th>
                            <th>Tên</th>
                            <th>Số điện thoại</th>
                            <th>Dịch vụ</th>
                            <th>Ghi chú</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="customer, stat : ${customerPage.content}">
                            <td th:if="${isAdmin}"><input type="checkbox" name="ids" th:value="${customer.customerId}"></td>
                            <td th:text="${stat.index + 1}"></td>
                            <td th:text="${customer.name}"></td>
                            <td th:text="${customer.phoneNumber}"></td>
                            <td th:text="${serviceMap[customer.serviceId]}"></td>
                            <td th:text="${customer.context}"></td>
                            <td th:text="${customer.status.status}"></td>
                            <td th:text="${#temporals.format(customer.updateAt != null ? customer.updateAt : customer.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a href="#editContactModal" class="edit" th:data-id="${customer.customerId}" data-bs-toggle="modal">
                                    <i class="material-icons" title="Sửa">&#xE254;</i>
                                </a>
                                <a href="javascript:void(0)" class="delete" th:if="${isAdmin}" th:onclick="'deleteCustomer(' + ${customer.customerId} + ')'">
                                    <i class="material-icons" title="Xoá">&#xE872;</i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </form>

                <!-- Phân trang -->
                <nav>
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${customerPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{'/admin/contact/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, customerPage.totalPages-1)}" th:classappend="${i} == ${currentPage} ? 'active'">
                            <a class="page-link" th:href="@{'/admin/contact/list'(page=${i}, size=${pageSize}, keyword=${keyword})}" th:text="${i+1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${customerPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{'/admin/contact/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>
</div>

<!-- Modal -->
<div th:replace="admin/contact/modal-add :: addModal"></div>
<div th:replace="admin/contact/modal-edit :: editModal"></div>
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const STORAGE_KEY = 'selectedCustomerIds';
    let selectedIds = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);

    document.addEventListener('DOMContentLoaded', () => {
        initCheckboxes();
        initDeleteSelected();
        initAddForm();
        initEditForm();
    });

    // ======================== XÓA 1 KHÁCH HÀNG =========================
    function deleteCustomer(id) {
        if (!confirm("Bạn có chắc chắn muốn xóa khách hàng này không?\nHành động này không thể phục hồi.")) return;
        fetch(`/admin/contact/delete/${id}`, { method: 'POST', headers: { [csrfHeader]: csrfToken } })
            .then(res => res.ok ? location.reload() : alert("Xóa thất bại!"))
            .catch(() => alert("Có lỗi xảy ra!"));
    }

    // ======================== CHECKBOX =========================
    function initCheckboxes() {
        const checkboxes = document.querySelectorAll('input[name="ids"]');
        const checkAll = document.getElementById('checkAll');

        checkboxes.forEach(cb => {
            const id = parseInt(cb.value);
            cb.checked = selectedIds.has(id);
            cb.addEventListener('change', () => {
                cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
            });
        });

        checkAll.addEventListener('click', e => {
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                const id = parseInt(cb.value);
                e.target.checked ? selectedIds.add(id) : selectedIds.delete(id);
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedIds]));
        });
    }

    // ======================== XÓA NHIỀU =========================
    function initDeleteSelected() {
        document.getElementById('deleteSelectedForm').addEventListener('submit', e => {
            if (selectedIds.size === 0) {
                alert("Vui lòng chọn ít nhất 1 khách hàng để xóa.");
                e.preventDefault();
                return;
            }
            if (!confirm("Bạn có chắc chắn muốn xóa các khách hàng đã chọn?\nHành động này không thể phục hồi.")) {
                e.preventDefault();
                return;
            }
            selectedIds.forEach(id => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'ids';
                input.value = id;
                e.target.appendChild(input);
            });
            localStorage.removeItem(STORAGE_KEY);
        });
    }

    // ======================== MODAL THÊM =========================
    function initAddForm() {
        const addForm = document.getElementById('addForm');
        const addModal = new bootstrap.Modal(document.getElementById('addContactModal'));

        addForm.addEventListener('submit', e => {
            e.preventDefault();

            fetch('/admin/contact/add', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: new FormData(addForm)
            })
                .then(async res => {
                    if (res.ok) {
                        const data = await res.json();
                        addModal.hide();
                        addForm.reset();
                        alert(data.message || "✅ Thêm khách hàng thành công!");
                        location.reload();
                    } else {
                        const errors = await res.json();
                        let errorMessage = "❌ Thêm khách hàng thất bại:\n";
                        for (const key in errors) {
                            errorMessage += `- ${errors[key]}\n`;
                        }
                        alert(errorMessage);
                    }
                })
                .catch((error) => {
                    console.error("Error:", error);
                    alert("🚨 Có lỗi xảy ra khi thêm khách hàng!");
                });
        });
    }


    // ======================== MODAL SỬA =========================
    function initEditForm() {
        const editModal = new bootstrap.Modal(document.getElementById('editContactModal'));
        const editForm = document.getElementById('editForm');
        const editButtons = document.querySelectorAll('.edit');

        const clearErrors = () => {
            document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
            document.querySelectorAll('.form-control').forEach(el => el.classList.remove('is-invalid'));
        };

        const showErrors = (errors) => {
            Object.keys(errors).forEach(field => {
                const input = document.getElementById(`edit${field.charAt(0).toUpperCase() + field.slice(1)}`);
                const errorDiv = document.getElementById(`edit${field.charAt(0).toUpperCase() + field.slice(1)}Error`);
                if (input && errorDiv) {
                    input.classList.add('is-invalid');
                    errorDiv.textContent = errors[field];
                }
            });
        };

        editButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                clearErrors();
                fetch(`/admin/contact/edit/${btn.dataset.id}`, { headers: { [csrfHeader]: csrfToken } })
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('editCustomerId').value = data.customerId;
                        document.getElementById('editName').value = data.name || '';
                        document.getElementById('editPhoneNumber').value = data.phoneNumber || '';
                        document.getElementById('editServiceId').value = data.serviceId || '';
                        document.getElementById('editContext').value = data.context || '';
                        document.getElementById('editStatus').value = data.status || 'PENDING';
                        editModal.show();
                    })
                    .catch(() => alert("Không thể tải dữ liệu khách hàng!"));
            });
        });

        editForm.addEventListener('submit', e => {
            e.preventDefault();
            clearErrors();
            const id = document.getElementById('editCustomerId').value;
            if (!id) {
                alert("Không tìm thấy ID khách hàng!");
                return;
            }
            fetch(`/admin/contact/update/${id}`, {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: new FormData(editForm)
            })
                .then(res => {
                    if (res.ok) return res.json();
                    if (res.status === 400) return res.json().then(err => { showErrors(err); throw new Error(); });
                    throw new Error();
                })
                .then(data => {
                    editModal.hide();
                    alert(data.message || "Cập nhật thành công!");
                    location.reload();
                })
                .catch(() => {});
        });
    }
</script>
<script src="/admin/js/scripts.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm bài viết mới</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

    <!-- CKEditor -->
    <script src="/static/customer/js/ckeditor5.js"></script>

    <!-- Custom CSS -->
    <link href="/admin/css/styles.css" rel="stylesheet"/>
</head>
<body class="sb-nav-fixed">

<!-- Header -->
<div th:replace="admin/common/header :: header"></div>

<div id="layoutSidenav">
    <!-- Sidebar -->
    <div th:replace="admin/common/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div id="layoutSidenav_content">
        <main class="container py-4">
            <div class="card shadow-sm rounded-4">
                <div class="card-header bg-success text-white rounded-top-4">
                    <h3 class="mb-0">📝 Thêm bài viết mới</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/post/save}" th:object="${post}" method="post">

                        <div class="mb-3">
                            <label for="title" class="form-label">Tiêu đề</label>
                            <input type="text" th:field="*{title}" class="form-control form-control-lg rounded-3"
                                   id="title" placeholder="Nhập tiêu đề bài viết" required>
                        </div>

                        <div class="mb-3">
                            <label for="contentEditor" class="form-label">Nội dung</label>
                            <textarea id="contentEditor" th:field="*{content}" class="form-control" rows="8"></textarea>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-success btn-sm rounded-pill px-4">💾 Lưu</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-4"
                                    onclick="confirmBack()">⬅️ Quay lại
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CKEditor Config -->
<script>
    CKEDITOR.ClassicEditor
        .create(document.querySelector('#contentEditor'), {
            toolbar: {
                items: [
                    'heading', '|',
                    'bold', 'italic', 'underline', 'strikethrough',
                    'fontColor', 'fontBackgroundColor', 'fontSize',
                    '|', 'alignment',
                    'bulletedList', 'numberedList', 'blockQuote',
                    'insertTable', 'mediaEmbed',
                    'imageUpload', '|', 'undo', 'redo'
                ]
            },
            simpleUpload: {
                uploadUrl: '/admin/post/uploadImage', // đường dẫn spring controller bạn viết
                withCredentials: false
            },
            language: 'vi'
        })
        .then(editor => console.log('Editor ready', editor))
        .catch(error => console.error(error));



    function confirmBack() {
        if (confirm("Bạn có chắc muốn quay lại mà không lưu bài viết?")) {
            window.location.href = "/admin/post/list";
        }
    }
</script>

<!-- Optional Custom JS -->
<script src="/admin/js/scripts.js"></script>

</body>
</html>

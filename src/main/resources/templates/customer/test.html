<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giao diện Responsive với Bootstrap 5</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<!-- Header -->
<header class="bg-primary text-white text-center py-3 mb-4">
    <h1>Tiêu đề Trang Web</h1>
</header>

<!-- Content + Sidebar -->
<div class="container">
    <div class="row">
        <!-- Content chính -->
        <main class="col-12 col-md-8 order-2 order-md-1 mb-4">
            <h2>Nội dung chính</h2>
            <p>Đây là phần nội dung chính của trang.</p>
        </main>

        <!-- Sidebar -->
        <aside class="col-12 col-md-4 order-1 order-md-2 mb-4">
            <h3>Sidebar</h3>
            <p>Đây là phần sidebar.</p>
        </aside>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-auto">
    © 2025 Bản quyền thuộc về bạn
</footer>

<!-- Bootstrap 5 JS (tuỳ chọn nếu bạn cần JS của Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <th:block th:replace="admin/common/header :: header"></th:block>
</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar :: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title d-flex justify-content-between align-items-center">
                        <h2>Quản lí <b>dự án thực tế</b></h2>
                        <div class="d-flex">
                            <form th:action="@{/admin/projectActual/list}" method="get" class="d-flex me-2" style="width: 300px;">
                                <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm khách hàng..."
                                       th:value="${keyword}" aria-label="Search">
                                <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
                            </form>
                            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addProjectActualModal">
                                <i class="material-icons">&#xE147;</i> <span>Thêm mới</span>
                            </button>
                        </div>
                    </div>

                    <table class="table table-striped table-hover mt-3">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên Khách hàng/Tiêu đề</th> <th>Nội dung</th>
                            <th>Link youtube</th>
                            <th>Ngày cập nhật/Ngày tạo</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="projectActual : ${projectActualPage.content}">
                            <td th:text="${projectActual.projectActualId}"></td>
                            <td th:text="${projectActual.nameCustomer}"></td>
                            <td th:text="${projectActual.content}"></td>
                            <td th:text="${projectActual.linkYoutube}"></td>
                            <td th:text="${#temporals.format(projectActual.updateAt != null ? projectActual.updateAt : projectActual.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a href="#" class="edit" th:data-id="${projectActual.projectActualId}" data-bs-toggle="modal" data-bs-target="#editProjectActualModal">
                                    <i class="material-icons" title="Sửa">&#xE254;</i>
                                </a>
                                <a href="#" class="delete" th:data-id="${projectActual.projectActualId}">
                                    <i class="material-icons" title="Xóa">&#xE872;</i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <nav>
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${projectActualPage.first} ? 'disabled'">
                                <a class="page-link" th:href="@{'/admin/projectActual/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, projectActualPage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/projectActual/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${projectActualPage.last} ? 'disabled'">
                                <a class="page-link" th:href="@{'/admin/projectActual/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>

            <div id="addProjectActualModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form method="post" th:action="@{/admin/projectActual/add}" th:object="${projectActualNew}">
                            <div class="modal-header">
                                <h4 class="modal-title">Thêm dự án thực tế</h4>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="form-group mb-2">
                                    <label>Tên Khách hàng/Tiêu đề</label>
                                    <input th:field="*{nameCustomer}" class="form-control" required>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Nội dung</label>
                                    <input th:field="*{content}" class="form-control" required>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Link Youtube</label>
                                    <input th:field="*{linkYoutube}" class="form-control" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-success">Thêm</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div id="editProjectActualModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form id="editForm">
                            <div class="modal-header">
                                <h4 class="modal-title">Chỉnh sửa dự án thực tế</h4>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" id="editProjectActualId" name="projectActualId">

                                <div class="form-group mb-2">
                                    <label>Tên Khách hàng/Tiêu đề</label>
                                    <input id="editNameCustomer" class="form-control" required>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Nội dung</label>
                                    <input id="editContent" class="form-control" required>
                                </div>
                                <div class="form-group mb-2">
                                    <label>Link Youtube</label>
                                    <input id="editLinkYoutube" class="form-control" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    $(function () {
        const csrfToken = $('meta[name="_csrf"]').attr('content');
        const csrfHeader = $('meta[name="_csrf_header"]').attr('content');

        function showAlert(msg) {
            alert(msg);
        }

        // Xử lý click sửa
        $('.edit').on('click', function () {
            const id = $(this).data('id');
            $.ajax({
                url: `/admin/projectActual/edit/${id}`,
                headers: { [csrfHeader]: csrfToken },
                success: data => {
                    $('#editProjectActualId').val(data.projectActualId);
                    $('#editNameCustomer').val(data.nameCustomer);
                    $('#editContent').val(data.content);
                    $('#editLinkYoutube').val(data.linkYoutube);
                    $('#editProjectActualModal').modal('show');
                },
                error: () => showAlert('❌ Không thể tải dữ liệu dự án thực tế.')
            });
        });

        // Xử lý xóa
        $('.delete').on('click', function (e) {
            e.preventDefault();
            const id = $(this).data('id');
            if (confirm('Bạn có chắc muốn xóa dự án thực tế này không?')) {
                $.ajax({
                    url: `/admin/projectActual/delete/${id}`,
                    type: 'POST',
                    headers: { [csrfHeader]: csrfToken },
                    success: () => {
                        showAlert('✅ Xóa dự án thực tế thành công!');
                        location.reload();
                    },
                    error: () => showAlert('❌ Xóa dự án thực tế thất bại.')
                });
            }
        });

        // Xử lý lưu chỉnh sửa
        $('#editForm').on('submit', function (e) {
            e.preventDefault();
            const id = $('#editProjectActualId').val();
            const projectActualData = {
                projectActualId: id,
                nameCustomer: $('#editNameCustomer').val(),
                content: $('#editContent').val(),
                linkYoutube: $('#editLinkYoutube').val()
            };
            $.ajax({
                url: `/admin/projectActual/update/${id}`,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(projectActualData),
                headers: { [csrfHeader]: csrfToken },
                success: () => {
                    // SỬA ID MODAL
                    $('#editProjectActualModal').modal('hide');
                    showAlert('✅ Cập nhật dự án thực tế thành công!');
                    location.reload();
                },
                error: () => showAlert('❌ Cập nhật thất bại.')
            });
        });
    });
</script>
<script src="/admin/js/scripts.js"></script>
</body>
</html>

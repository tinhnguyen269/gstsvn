<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head(
   ${project.projectName},
    ~{::styles},
    ~{::meta}
)">
    <th:block th:fragment="meta">
        <!-- Thẻ meta SEO -->
        <meta name="description" th:content="${project.projectName + ' - Dự án đã hoàn thành của GSTS'}">
        <link rel="canonical" th:href="${canonicalUrl}">

        <!-- Open Graph -->
        <meta property="og:type" content="article">
        <meta property="og:title" th:content="${project.projectName}">
        <meta property="og:description" th:content="${project.projectName + ' - Dự án đã hoàn thành của GSTS'}">
        <meta property="og:url" th:content="${canonicalUrl}">
        <meta property="og:image" th:content="${canonicalUrl}">
    </th:block>
    <th:block th:fragment="styles">
        <link href="/customer/css/post-detail.css" rel="stylesheet">
        <link href="/customer/css/project.css" rel="stylesheet"/>
    </th:block>
</head>

<body class="d-flex flex-column min-vh-100">
<div th:replace="customer/common/navbar:: header"></div>

<main class="container mt-5 pt-4 flex-grow-1">
    <div class="row">
        <h1 class="visually-hidden" th:text="${project.projectName}">GSTS - Dự án đã hoàn thành</h1>

        <div class="col-12 col-md-9 mb-4">
            <article class="container my-5 service-detail">
                <nav aria-label="breadcrumb" class="pt-4 mt-1">
                    <ol class="breadcrumb bg-transparent p-0 mb-3">
                        <li class="breadcrumb-item">
                            <a th:href="@{/}" class="text-decoration-none">Trang chủ</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">Dự án đã hoàn thành</li>
                    </ol>
                </nav>

                <h2 class="fw-bold mb-4" th:text="${project.projectName}"></h2>

                <section class="row g-4">
                    <div class="col-lg-4 col-md-6 col-sm-12" th:each="img : ${images}">
                        <div class="image-wrapper">
                            <img th:src="@{${img.imageProjectUrl}}"
                                 th:alt="${'Hình ảnh dự án ' + project.projectName}"
                                 class="img-fluid project-img-hover rounded shadow-sm"
                                 loading="lazy">
                        </div>
                    </div>
                </section>
            </article>
        </div>

        <!-- Modal hiển thị ảnh -->
        <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-xl">
                <div class="modal-content bg-transparent border-0">
                    <div class="modal-body text-center p-0">
                        <img id="modalImage" src="" class="img-fluid rounded shadow" alt="Ảnh phóng to dự án"
                             style="cursor:pointer;">
                    </div>
                </div>
            </div>
        </div>

        <aside class="col-12 col-md-3">
            <section th:replace="customer/common/sidebar :: sidebarPost"></section>
            <section class="mb-4" th:replace="customer/common/sidebar :: sidebarService"></section>
        </aside>
    </div>

    <!-- Button contact & scroll -->
    <div th:replace="customer/common/contact :: contact"></div>
</main>
<div th:replace="customer/common/scroll_head :: scroll-head"></div>

<!-- Live Chat Widget -->
<div th:replace="customer/common/livechat :: livechat"></div>

<footer th:replace="customer/common/footer :: footer"></footer>

<!-- JAVASCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="/customer/js/common.js" defer></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll(".project-img-hover");
        const modalImage = document.getElementById("modalImage");
        const modal = new bootstrap.Modal(document.getElementById("imageModal"));
        let currentIndex = 0;

        images.forEach((img, index) => {
            img.addEventListener("click", () => {
                currentIndex = index;
                modalImage.src = img.src;
                modal.show();
            });
        });

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            modalImage.src = images[currentIndex].src;
        }

        modalImage.addEventListener("click", nextImage);

        document.addEventListener("keydown", (e) => {
            if (document.getElementById("imageModal").classList.contains("show")) {
                if (e.key === "ArrowRight") nextImage();
            }
        });
    });
</script>
<script src="/customer/js/common.js"></script>
</body>
</html>

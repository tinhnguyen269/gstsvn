<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head('Tin tức - GSTS', ~{::styles})">
    <styles>
        <link href="/customer/css/home.css" rel="stylesheet">
    </styles>
</head>
<body class="shop-detail-page">

<div th:replace="customer/common/header::header"></div>
<div class="col-12 order-2 order-md-1 mb-4">
    <div class="container mt-5 pt-4">
        <nav aria-label="breadcrumb" class="pt-4 mt-1">
            <ol class="breadcrumb bg-transparent p-0 mb-3">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-dark">Trang chủ</a></li>
                <li class="breadcrumb-item active text-dark" aria-current="page">Tin tức</li>
            </ol>
        </nav>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            <div th:each="post : ${Post}" class="col">
                <div class="news-card h-100 border rounded shadow-sm overflow-hidden">
                    <img th:src="${post.imageUrl}" th:alt="${post.title}"
                         alt="Tin tức"
                         class="img-fluid w-100"
                         style="height:180px;object-fit:cover;">

                    <div class="p-3">
                        <h6 th:text="${post.title}" class="fw-bold mb-2"></h6>
                        <p th:text="${#temporals.format(post.createAt, 'dd/MM/yyyy HH:mm')}" class="text-muted small mb-2"></p>
                        <a th:href="@{/tin-tuc/{slug}(slug=${post.slug})}"
                           class="btn btn-outline-success btn-sm rounded-pill">Xem chi tiết</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- PHÂN TRANG -->
        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center">

                <!-- Previous -->
                <li class="page-item mx-1" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link rounded-circle d-flex align-items-center justify-content-center"
                       style="width:40px; height:40px;"
                       th:href="@{/tin-tuc(page=${currentPage - 2})}"
                       aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <!-- Pages -->
                <li class="page-item mx-1"
                    th:each="page : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${page == currentPage} ? 'active'">
                    <a class="page-link rounded-circle d-flex align-items-center justify-content-center"
                       style="width:40px; height:40px;"
                       th:href="@{/tin-tuc(page=${page - 1})}"
                       th:text="${page}">1</a>
                </li>

                <!-- Next -->
                <li class="page-item mx-1" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link rounded-circle d-flex align-items-center justify-content-center"
                       style="width:40px; height:40px;"
                       th:href="@{/tin-tuc(page=${currentPage})}"
                       aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    <!-- Nút liên hệ -->
    <div class="mt-5" th:replace="customer/common/contact :: contact"></div>
    <!--Button scroll head-->
    <div th:replace="customer/common/scroll_head:: scroll-head"></div>
</div>

<div th:replace="customer/common/footer::footer"></div>

<!-- JAVASCRIPT FILES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/customer/js/home.js"></script>
<script src="/customer/js/common.js"></script>

</body>
</html>

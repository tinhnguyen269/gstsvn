<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="customer/common/head :: head('Bảng giá dịch vụ vệ sinh GSTS - Giá chi tiết các gói dịch vụ', ~{::styles})">
    <styles>
        <link href="/customer/css/price-list.css" rel="stylesheet" />
    </styles>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="customer/common/navbar::header"></div>
<!-- MAIN CONTENT -->
<main class="container mt-5 pt-5 flex-grow-1">
    <!-- Tiêu đề chính của trang -->
    <h1 class="visually-hidden">Bảng giá dịch vụ vệ sinh GSTS - Cập nhật mới nhất</h1>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent p-0 mb-3">
            <li class="breadcrumb-item">
                <a th:href="@{/}" class="text-decoration-none text-dark">Trang chủ</a>
            </li>
            <li class="breadcrumb-item active text-dark" aria-current="page">Bảng giá</li>
        </ol>
    </nav>

    <!-- Tabs chọn dịch vụ -->
    <section aria-label="Danh mục bảng giá dịch vụ">
        <ul class="nav nav-tabs justify-content-center">
            <li th:each="service, iterStat : ${serviceAdvice}" class="nav-item">
                <button type="button"
                        class="nav-link"
                        th:text="${service.serviceName}"
                        th:attr="data-img=${service.imgPrice}, id=${iterStat.index == 0 ? 'first-tab' : null}"
                        onclick="changeImage(event, this)">
                </button>
            </li>
        </ul>
    </section>

    <!-- Bảng giá -->
    <section class="price-table text-center my-4" aria-label="Bảng giá chi tiết">
        <img id="priceImage"
             src=""
             alt="Bảng giá chi tiết dịch vụ vệ sinh GSTS"
             class="img-fluid rounded shadow transition-opacity"
             style="transition: opacity 0.3s ease;" />
    </section>

    <!-- LIÊN HỆ -->
    <section class="mt-5" th:replace="customer/common/contact::contact"></section>
</main>

<!-- FOOTER -->
<footer th:replace="customer/common/footer::footer" class="mt-auto"></footer>

<!-- JAVASCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function changeImage(event, element) {
        const imageUrl = element.getAttribute('data-img');
        const priceImg = document.getElementById('priceImage');

        priceImg.style.opacity = '0';
        setTimeout(() => {
            priceImg.src = imageUrl;
            priceImg.style.opacity = '1';
        }, 300);

        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => link.classList.remove('active'));
        element.classList.add('active');
    }

    window.onload = function () {
        const priceImg = document.getElementById('priceImage');
        const firstTab = document.getElementById('sofa-tab');
        if (firstTab) {
            priceImg.src = firstTab.getAttribute('data-img');
            firstTab.classList.add('active');
        }
    }
</script>
<script src="/customer/js/common.js"></script>
</body>
</html>

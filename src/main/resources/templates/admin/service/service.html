<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <title>GSTS-Quản lí</title>
    <th:block th:replace="admin/common/header :: header"></th:block>

    <script>
        $(document).ready(function () {
            // Activate tooltip
            $('[data-toggle="tooltip"]').tooltip();

            // Select/Deselect checkboxes
            var checkbox = $('table tbody input[type="checkbox"]');
            $("#selectAll").click(function () {
                if (this.checked) {
                    checkbox.each(function () {
                        this.checked = true;
                    });
                } else {
                    checkbox.each(function () {
                        this.checked = false;
                    });
                }
            });
            checkbox.click(function () {
                if (!this.checked) {
                    $("#selectAll").prop("checked", false);
                }
            });
        });
    </script>
</head>
<body class="sb-nav-fixed">
<div th:replace="admin/common/navbar :: navbar"></div>
<div id="layoutSidenav">
    <div th:replace="admin/common/sidebar:: sidebar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="table-responsive">
                <div class="table-wrapper">
                    <div class="table-title">
                        <div class="row">
                            <div class="col-sm-6">
                                <h2>Quản lí <b>dịch vụ</b></h2>
                            </div>
                            <div class="col-sm-12 d-flex justify-content-end">
                                <div class="input-group me-2" style="width: 250px;">
                                    <form th:action="@{/admin/service/list}" method="get" class="d-flex me-2" style="width: 300px;">
                                        <input class="form-control me-2" type="text" name="keyword" placeholder="Tìm dịch vụ..."
                                               th:value="${keyword}" aria-label="Search">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                                <a th:href="@{/admin/service/add}" class="btn btn-success">
                                    <i class="material-icons">&#xE147;</i> <span>Thêm mới</span>
                                </a>
                            </div>


                        </div>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên dịch vụ</th>
                            <th>Ngày tạo</th>
                            <th>Người tạo</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="service : ${servicePage.content}">
                            <td th:text="${service.serviceId}"></td>
                            <td th:text="${service.serviceName}"></td>
                            <td th:text="${#temporals.format(service.updateAt != null ? service.updateAt : service.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${service.createBy}"></td>
                            <td>
                                <a th:href="@{'/admin/service/edit/' + ${service.serviceId}}" class="edit"><i
                                        class="material-icons" data-toggle="tooltip" title="Edit">&#xE254;</i></a>
                                <a href="#deleteServiceModal" class="delete" data-toggle="modal"
                                   th:onclick="'openDeleteModal(' + ${service.serviceId} + ')'"><i
                                        class="material-icons" data-toggle="tooltip" title="Delete">&#xE872;</i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center">
                            <!-- Previous -->
                            <li class="page-item" th:classappend="${servicePage.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/service/list'(page=${currentPage-1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, servicePage.totalPages-1)}"
                                th:classappend="${i} == ${currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{'/admin/service/list'(page=${i}, size=${pageSize}, keyword=${keyword})}"
                                   th:text="${i+1}">1</a>
                            </li>

                            <!-- Next -->
                            <li class="page-item" th:classappend="${servicePage.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{'/admin/service/list'(page=${currentPage+1}, size=${pageSize}, keyword=${keyword})}">Next</a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>
            <!-- Delete Modal HTML -->
            <div id="deleteServiceModal" class="modal fade">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h4 class="modal-title">Xóa dịch vụ </h4>
                            <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;
                            </button>
                        </div>
                        <div class="modal-body">
                            <p>Bạn có chắc chắn muốn xóa dịch vụ không ?</p>
                            <p class="text-warning"><small>Hành động này không thể phục hồi.</small></p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-default" data-dismiss="modal">Hủy</button>
                            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Xóa</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="admin/js/scripts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
<script src="admin/assets/demo/chart-area-demo.js"></script>
<script src="admin/assets/demo/chart-bar-demo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
        crossorigin="anonymous"></script>
<script src="admin/js/datatables-simple-demo.js"></script>

<script>
    let serviceIdToDelete = null;

    function openDeleteModal(serviceId) {
        serviceIdToDelete = serviceId;
        const deleteModal = new bootstrap.Modal(document.getElementById('deleteServiceModal'));
        deleteModal.show();
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
        if (serviceIdToDelete) {
            fetch(`/admin/service/delete/${serviceIdToDelete}`, {
                method: 'POST'
            })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert("Xóa thất bại!");
                    }
                })
                .catch(error => {
                    console.error(error);
                    alert("Có lỗi xảy ra!");
                });
        }
    });

</script>
</body>
</html>
